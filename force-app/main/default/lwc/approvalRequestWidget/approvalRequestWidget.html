<template>
    <lightning-card variant="Narrow" title="Approval Requests" icon-name="standard:account">
        <div class="slds-p-horizontal_medium">
            <template if:true={approvalRequests.length}>
                <lightning-datatable
                    key-field="Id"
                    data={pagedApprovalRequests}
                    columns={columns}
                    hide-checkbox-column="true">
                </lightning-datatable>
                <div class="slds-m-top_medium slds-grid slds-grid_align-center">
                    <lightning-button-icon
                        icon-name="utility:left"
                        alternative-text="Previous"
                        onclick={handlePrevious}
                        disabled={isPreviousDisabled}
                        class="slds-m-right_small">
                    </lightning-button-icon>
                    <span>Page {currentPage} of {totalPages}</span>
                    <lightning-button-icon
                        icon-name="utility:right"
                        alternative-text="Next"
                        onclick={handleNext}
                        disabled={isNextDisabled}
                        class="slds-m-left_small">
                    </lightning-button-icon>
                </div>
            </template>
            <template if:false={approvalRequests.length}>
                <p class="slds-text-align_center slds-m-top_medium slds-m-bottom_medium">
                    You don't have any pending approval requests.
                </p>
            </template>
        </div>
    </lightning-card>
</template>
