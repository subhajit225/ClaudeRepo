<template>
	<div class="cardContainer">
		<lightning-card variant="narrow">
			<template if:false={error}>
				<div class="slds-size_12-of-12 slds-medium-size_12-of-12 slds-large-size_12-of-12">
					<div class="slds-grid ">
						<div class="header slds-col slds-size_2-of-4" onclick={toggleSection}>
							<lightning-icon size="xx-small" icon-name={iconName}></lightning-icon>
							<span class="headerfont" >Case Summary by Project Genius</span><br />
						</div>
						<div class="slds-col slds-size_2-of-4 slds-p-right_small">

							<template if:true={showJsonObject}>
								<div class="icons-div">
									<lightning-button label="Like" title="like" onclick={handleVoteUp} icon-name="utility:like"
										class="slds-p-around_xxx-small greyed-out">
									</lightning-button>
									<lightning-button label="Dislike" title="dislike" onclick={handleVoteDown} icon-name="utility:dislike"
										class="slds-p-around_xxx-small greyed-out">
									</lightning-button>
									<lightning-button label="View Feedback" title="View Feedback" onclick={handleViewFeedback} icon-name="utility:comments"
										class="slds-p-around_xxx-small greyed-out">
									</lightning-button>
								</div>
							</template>

						</div>
					</div>
					<template if:true={showJsonObject} >
						<div class="header">
							<span class="headerfont" >Last Updated At:&nbsp;</span><span class="json-values">{lastUpdatedAt} </span>
						</div>
					</template>
					<template if:true={showJsonObject}>
						<template if:true={AutoGeneratedSectionHide}>
							<div class="header">
								<span class="headerfont" >{CaseSummaryText}</span>
							</div>
							<lightning-accordion allow-multiple-sections-open
							active-section-name={activeSections}>
								<template for:each={jsonEntries} for:item="entry">
									<div key={entry.key}>
										<lightning-accordion-section name={entry.key} label={entry.key} class="headerfont">
											<lightning-formatted-rich-text value={entry.value} class="json-values">
												{entry.value}</lightning-formatted-rich-text>
										</lightning-accordion-section>
									</div>
								</template>
							</lightning-accordion>
						</template>
					</template>

				</div>
			</template>
			<template if:true={error}>
				<div class="slds-size_12-of-12 slds-medium-size_12-of-12 slds-large-size_12-of-12">
					<div class="header slds-col slds-size_3-of-4" onclick={toggleSection}>
						<lightning-icon size="xx-small" icon-name={iconName}></lightning-icon>
						<span class="headerfont" >Case Summary by Project Genius</span>
					</div>
					<template if:true={AutoGeneratedSectionHide}>
						<div class="slds-text-color_error headerfont errorMsg">Error loading case data.</div>
					</template>
				</div>
			</template>
		</lightning-card>
	</div>

	<!-- Vote Up Dialog -->

	<!-- modal start -->
	<template if:true={showVoteUp}>
		<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
			aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
			<div class="slds-modal__container">
				<!-- modal header start -->
				<header class="slds-modal__header">
					<h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Share more feedback</h2>
				</header>

				<!-- modal body start -->
				<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
					<template if:true={showLoader}>
						<div class="loader">
							<lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
						</div>
					</template>
					<template if:false={showLoader}>
						<lightning-record-edit-form object-api-name="Case_Summary_by_Project_Genius_Feedback__c">
							<lightning-input-field field-name="Problem_in_Section__c" data-id="feedbackSection"
								required > </lightning-input-field>
							<lightning-input-field field-name="VoteUp_Feedback_comment__c" data-id="feedbackCommentUp"
								required > </lightning-input-field>
						</lightning-record-edit-form>
					</template>
				</div>

				<!-- modal footer start-->
				<footer class="slds-modal__footer">
					<button class="slds-button slds-button_brand" data-vote-type="voteUp"  onclick={handleSave}>Save</button>
					<button class="slds-button slds-button_neutral" aria-label="Cancel and close" onclick={handleClose}>Cancel</button>
				</footer>

			</div>
		</section>
		<div class="slds-backdrop slds-backdrop_open"></div>
	</template>
	<!-- modal end -->

	<!-- Vote down Dialog -->

	<!-- modal start -->
	<template if:true={showVoteDown}>
		<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true"
			aria-describedby="modal-content-id-2" class="slds-modal slds-fade-in-open">
			<div class="slds-modal__container">
				<!-- modal header start -->
				<header class="slds-modal__header">
					<h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">Share more feedback</h2>
				</header>

				<!-- modal body start -->
				<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
					<template if:true={showLoader}>
						<div class="loader">
							<lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
						</div>
					</template>
					<template if:false={showLoader}>
						<lightning-record-edit-form object-api-name="Case_Summary_by_Project_Genius_Feedback__c">
							<lightning-input-field field-name="Problem_Type__c" data-id="problemType"
								required> </lightning-input-field>
							<lightning-input-field field-name="Problem_in_Section__c" data-id="problemSection"
								required> </lightning-input-field>
							<lightning-input-field field-name="VoteUp_Feedback_comment__c" data-id="feedbackCommentDown"
								required> </lightning-input-field>
						</lightning-record-edit-form>
					</template>
				</div>

				<!-- modal footer start-->
				<footer class="slds-modal__footer">
					<button class="slds-button slds-button_brand" data-vote-type="voteDown" onclick={handleSave}>Save</button>
					<button class="slds-button slds-button_neutral" aria-label="Cancel and close" onclick={handleClose}>Cancel</button>
				</footer>

			</div>
		</section>
		<div class="slds-backdrop slds-backdrop_open"></div>
	</template>
	<!-- modal end -->

	<!-- Vote Up Dialog -->

	<!-- modal start -->
	<template if:true={showFeedbacks}>
		<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
			aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open  slds-modal_large">
			<div class="slds-modal__container">
				<!-- modal header start -->
				<header class="slds-modal__header">
					<h2 id="modal-heading-03" class="slds-text-heading_medium slds-hyphenate">Feedbacks</h2>
				</header>

				<!-- modal body start -->
				<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-3">
					<template if:true={showLoader}>
						<div class="loader">
							<lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
						</div>
					</template>
					<template if:false={showLoader}>
						<div>
							<lightning-datatable 
							data={feedbackData} 
							columns={feedbackColumns} 
							key-field="Id" 
							onrowaction={handleRowAction}
							hide-checkbox-column>
							</lightning-datatable>
						</div>
					</template>
				</div>

				<!-- modal footer start-->
				<footer class="slds-modal__footer">
					<button class="slds-button slds-button_neutral" aria-label="Cancel and close" onclick={handleClose}>Cancel</button>
				</footer>

			</div>
		</section>
		<div class="slds-backdrop slds-backdrop_open"></div>
	</template>
	<!-- modal end -->
</template>
