<template>
   <div class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
         <template if:true={hasEditCustomPermission}>
         <template if:true={success}>
            <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
               <div class="toast slds-notify__content">
                  <lightning-icon class="successIcon" icon-name="utility:success"
                     alternative-text="Success"
                     variant="inverse"
                     size="small" ></lightning-icon>
                  <div>
                     <h2 class="slds-text-heading_small">Success</h2>
                     <p>Record saved successfully.</p>
                  </div>
               </div>
               <button class="icon slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleToastCancel}>
                  <lightning-icon icon-name="utility:close"
                     alternative-text="close"
                     variant="inverse"
                     size="x-small" ></lightning-icon>
                  <span class="slds-assistive-text">Close</span>
               </button>
            </div>
         </template>
         <template if:true={newmode}>
            <div class="slds-modal__header">
               <h2 class="slds-text-heading_medium">Case Special Handling</h2>
               <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCancel}>
                  <lightning-icon icon-name="utility:close"
                     alternative-text="close"
                     variant="inverse"
                     size="small" ></lightning-icon>
                  <span class="slds-assistive-text">Close</span>
               </button>
            </div>
            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium" >
               <lightning-spinner if:true={isSubmitting} alternative-text="Loading" size="medium"></lightning-spinner>
               <lightning-record-edit-form
                  object-api-name="Case_Special_Handling__c"
                  onsuccess={handleSuccess}
                  onsubmit={handleSubmit}
                  oncancel={handleCancel}
                  onerror={handleError}
                  >
                  <lightning-messages></lightning-messages>
                  <div class="fieldsFlex">
                     <template for:each={fields} for:item="field">
                        <div class="field" key={field}>
                           <lightning-input-field key={field.apiName} field-name={field.apiName} required={field.required} data-name={field.apiName} value={field.value} disabled={field.unchange}></lightning-input-field>
                        </div>
                     </template>
                  </div>
                  <div class="slds-modal__footer slds-grid slds-grid_align-center">
                     <lightning-button type="submit" label="Save" variant="brand" class="slds-m-right_x-small"></lightning-button>
                     <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-left_x-small"></lightning-button>
                  </div>
               </lightning-record-edit-form>
            </div>
         </template>
         <template if:true={editmode}>
            <!-- Header -->
            <div class="slds-modal__header">
               <h2 class="slds-text-heading_medium">Edit Case Special Handling</h2>
               <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCancel}>
                  <lightning-icon icon-name="utility:close"
                     alternative-text="close"
                     variant="inverse"
                     size="small" ></lightning-icon>
                  <span class="slds-assistive-text">Close</span>
               </button>
            </div>
            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium">
               <lightning-spinner if:true={isSubmitting} alternative-text="Loading" size="medium"></lightning-spinner>
               <lightning-record-edit-form
                  object-api-name="Case_Special_Handling__c"
                  onsuccess={handleSuccess}
                  onsubmit={handleSubmit}
                  oncancel={handleCancel}
                  record-id={recordId}
                  >
                  <lightning-messages></lightning-messages>
                  <div class="fieldsFlex">
                     <template for:each={fields} for:item="field">
                        <div class="field" key={field.apiName}>
                           <lightning-input-field key={field.apiName} field-name={field.apiName} disabled={field.isDisabled}></lightning-input-field>
                        </div>
                     </template>
                  </div>
                  <div class="slds-modal__footer slds-grid slds-grid_align-center">
                     <lightning-button type="submit" label="Save" variant="brand" class="slds-m-right_x-small"></lightning-button>
                     <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-left_x-small"></lightning-button>
                  </div>
               </lightning-record-edit-form>
            </div>
         </template>
         </template>
         <template if:false={hasEditCustomPermission}>
               <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCancel}>
                  <lightning-icon icon-name="utility:close"
                     alternative-text="close"
                     variant="inverse"
                     size="small" ></lightning-icon>
                  <span class="slds-assistive-text">Close</span>
               </button>
             <div class="slds-modal__content slds-p-around_medium">
                <p><strong>You have Insufficient Privileges to modify this record. Please contact the administrator for more details.</strong></p>
            </div>
         </template>
      </div>
   </div>
   <div class="slds-backdrop slds-backdrop_open"></div>
</template>
