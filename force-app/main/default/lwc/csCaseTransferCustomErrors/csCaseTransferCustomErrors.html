<template>
    <div class="slds-col slds-size_2-of-2 slds-m-top_medium slds-m-bottom_medium" if:true={showErrors}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <span class="slds-icon_container slds-icon-utility-error slds-m-right_x-small"
                title="Description of icon when needed">
                <lightning-icon icon-name="utility:error" alternative-text="Error!" variant="inverse"
                    title="error variant x-small" size="x-small"></lightning-icon>
            </span>
            <h2>
                <template for:each={customErrors} for:item="error">
                    <li key={error}>
                        {error} &nbsp;
                    </li>
                </template>
            </h2>
            <div class="slds-notify__close">
                <button class="slds-button slds-button_icon slds-button_icon-small slds-button_icon-inverse"
                    title="Close" onclick={handleClose}>
                    x
                    <span class="slds-assistive-text">Close</span>
                </button>
            </div>
        </div>
    </div>
</template>
