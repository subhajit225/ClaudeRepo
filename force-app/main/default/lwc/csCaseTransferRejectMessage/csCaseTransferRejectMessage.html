<template>
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" title="Close" icon-name="utility:close"
                        icon-class="slds-button_icon-inverse" onclick={handleClose}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium
                                slds-hyphenate
                                header-string">
                        Not Approved to Handover
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <lightning-textarea value={rejectMessage} onchange={handleRejectMessageChange}>
                    </lightning-textarea>
                </div>

                <footer class="slds-modal__footer modal-hidden">
                    <lightning-button label="Cancel"
                        title="Cancel" onclick={handleClose} class="slds-m-top_xx-large">
                    </lightning-button>
                    <lightning-button  variant="brand" label="Not Approved To Handover"
                        title="Not Approved To Handover" onclick={handleNotApprovedToHandover} class="slds-m-top_xx-large slds-m-right_small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
