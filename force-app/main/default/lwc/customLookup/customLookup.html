<!-- 
    @Author             : Vijay Kumar K R
    @CreatedDate        : Aug 2, 2022
    @Description        : Dynamic Custom Lookup LWC Component
    @Controller         : DynamicLookupController
-->
<template>
    <div class="slds-form-element" onmouseleave={toggleResult} data-source="lookupContainer">
        <div class="slds-combobox_container slds-has-selection">

            <!-- Single Column -->
            <template if:false={isSingleColumn}>
                <div class="slds-grid slds-grid_vertical-align-center">
                    <label class="slds-form-element__label " for="combobox-id-1">{label}</label>
                    <template if:true={helptext}>
                        <lightning-helptext content={helptext}></lightning-helptext>
                    </template>
                </div>
                <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
                    <div class="searchBoxWrapper slds-show">
                        <!--Lookup Input Field-->
                        <lightning-input type="search" data-source="searchInputField" onclick={toggleResult}
                            onchange={handleKeyChange} is-loading={isSearchLoading} value={searchKey}
                            variant="label-hidden" placeholder={placeholder}></lightning-input>
                    </div>

                    <!--Lookup Selected record pill container start-->
                    <div class="pillDiv slds-hide">
                        <span class="slds-icon_container slds-combobox__input-entity-icon">
                            <lightning-icon icon-name={iconName} size="x-small" alternative-text="icon">
                            </lightning-icon>
                        </span>
                        <input type="text" id="combobox-id-1" value={selectedRecord.Name}
                            class="slds-input slds-combobox__input slds-combobox__input-value" readonly />
                        <button type="button" class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                            title="Remove selected option">
                            <lightning-icon icon-name="utility:close" size="x-small" alternative-text="close icon"
                                onclick={handleRemove}></lightning-icon>
                        </button>
                    </div>
                </div>
            </template>
            <!-- Two Column -->
            <template if:true={isSingleColumn}>
                <lightning-layout class="slds-m-bottom_medium">
                    <lightning-layout-item>
                        <abbr class="slds-required slds-hide" title="required">*</abbr>
                        <label class="slds-p-left_medium label slds-form-element__label" for="combobox-id-2">{label}</label>
                        <template if:true={helptext}>
                            <lightning-helptext content={helptext}></lightning-helptext>
                        </template>
                    </lightning-layout-item>
                    <lightning-layout-item style={inputcss} alignment-bump="left">
                        <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right"
                            role="none">
                            <div class="searchBoxWrapper slds-show">
                                <!--Lookup Input Field-->
                                <lightning-input type="search" data-source="searchInputField" onclick={toggleResult}
                                    onchange={handleKeyChange} is-loading={isSearchLoading} value={searchKey}
                                    variant="label-hidden" placeholder={placeholder}></lightning-input>
                            </div>

                            <!--Lookup Selected record pill container start-->
                            <div class="pillDiv slds-hide">
                                <span class="slds-icon_container slds-combobox__input-entity-icon">
                                    <lightning-icon icon-name={iconName} size="x-small" alternative-text="icon">
                                    </lightning-icon>
                                </span>
                                <input type="text" id="combobox-id-2" value={selectedRecord.Name}
                                    class="slds-box slds-input slds-combobox__input slds-combobox__input-value" style="height: 3em;" readonly />
                                <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                                    title="Remove selected option">
                                    <lightning-icon icon-name="utility:close" size="x-small"
                                        alternative-text="close icon" onclick={handleRemove}></lightning-icon>
                                </button>
                            </div>
                        </div>
                    </lightning-layout-item>
                </lightning-layout>
            </template>

            <div class="lookupInputContainer slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click"
                aria-expanded="false" aria-haspopup="listbox" role="combobox">

                <!-- lookup search result part start-->
                <div style={dropdownstyle} id="listbox-id-5" class="dropdownclass slds-dropdown slds-dropdown_length-with-icon-5 slds-dropdown_fluid" role="listbox">
                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                        <template for:each={lstResult} for:item="obj">
                            <li key={obj.Id} role="presentation" class="slds-listbox__item">
                                <div data-recid={obj.Id} onclick={handelSelectedRecord}
                                    class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta"
                                    role="option">
                                    <span style="pointer-events: none;"
                                        class="slds-media__figure slds-listbox__option-icon">
                                        <span class="slds-icon_container">
                                            <lightning-icon icon-name={iconName} size="small" alternative-text="icon">
                                            </lightning-icon>
                                        </span>
                                    </span>
                                    <span style="pointer-events: none;" class="slds-media__body">
                                        <template if:true={isRscObject}>
                                            <span class="slds-listbox__option-text slds-listbox__option-text_entity" style="color: #009dac;">
                                                {obj.Name}
                                            </span>
                                            <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">
                                                <span style="font-weight: bold;">{meta_entity_label3}:</span> {obj.AccName}
                                            </span>
                                            <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">
                                                <span style="font-weight: bold;">{meta_entity_label}:</span> {obj.MetaVal} | &nbsp;
                                                <span style="font-weight: bold;">{meta_entity_label2}:</span> {obj.MetaVal2} | &nbsp;
                                                <span style="font-weight: bold;">{computedLabel4}:</span> {obj.MetaVal3}
                                            </span>
                                        </template>
                                        <template if:false={isRscObject}>
                                            <span class="slds-listbox__option-text slds-listbox__option-text_entity">{obj.Name}</span>
                                            <template if:true={meta_entity_api}>
                                                <template if:true={meta_entity_label2}>
                                                    <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">
                                                        {obj.MetaVal2}
                                                    </span>
                                                </template>
                                                <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">
                                                    {meta_entity_label} • {obj.MetaVal}
                                                </span>
                                            </template>
                                        </template>
                                    </span>
                                </div>
                            </li>
                        </template>
                        <!--ERROR msg, if there is no records..-->
                        <template if:false={hasRecords}>
                            <li class="slds-listbox__item" style="text-align: center; font-weight: bold;">{emptyrecordmsg}</li>
                        </template>
                    </ul>

                </div>
            </div>
        </div>
    </div>
</template>
