<template>
    <template if:true={isLoaded}>
        <lightning-quick-action-panel header={statusTemp}>
            <div class="slds-modal__content slds-p-around_medium">
                <lightning-input 
                    type="text" 
                    label="New Comment" 
                    value={inputText} 
                    onchange={handleInputChange}>
                </lightning-input>
            </div>
            <div slot="footer">
                <lightning-button 
                    variant="brand" 
                    label="Save" 
                    onclick={handleSave}>
                </lightning-button>
                <lightning-button 
                    class="slds-p-horizontal_medium"
                    variant="neutral" 
                    label="Cancel" 
                    onclick={closeModal}>
                </lightning-button>
            </div>
        </lightning-quick-action-panel>
    </template>
     <template if:false={isLoaded}>
             <lightning-spinner alternative-text="Loading"></lightning-spinner>
    </template>
</template>
