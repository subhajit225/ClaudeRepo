<template>
    <div if:false={isLoaded} class="slds-is-relative">
        <lightning-spinner
            alternative-text="Loading..." variant="brand">
        </lightning-spinner>
    </div>

    
    
    <div if:true={isLoaded} class="slds-is-relative">
    <template if:false={showTable}>
        <div class="slds-align_absolute-center slds-theme--shade"
            style="margin: 10px;height:3rem;border: 2px solid rgb(20, 95, 133);border-radius: 10px;">
            No Records Found
        </div>
    </template>
    <template if:true={showTable}>
       <div class="">
            <div class="slds-col slds-size_1-of-5 ">
            <lightning-input label="Filter" value={filterText} onchange={handleFilterChange}></lightning-input>
          </div>
           <div class = "slds-p-around_small">
              <p><b>Total Record Count</b> : {filteredData.length}</p>
          </div>
        </div>
        
    <!-- Lightning Datatable -->
    <lightning-datatable key-field="Id" data={filteredData} onsave={handleSave}
                                 draft-values={saveDraftValues} hide-checkbox-column show-row-number-column
    columns={columns} wrap-text-max-lines=20>
</lightning-datatable>
    </template>
</div>
</template>
