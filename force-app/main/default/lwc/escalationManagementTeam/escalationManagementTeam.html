<template>
    <div class="background">
        <lightning-spinner if:true={showSpinner} alternative-text="Loading" size="medium"></lightning-spinner>
        <!-- Custom Header -->
        <div class="slds-page-header">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <lightning-icon icon-name="standard:case" alternative-text="Case" title="Case"></lightning-icon>
                        <div class="slds-media__body slds-var-p-left_medium">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span class="slds-page-header__title slds-truncate" title="Escalation Management Team (EMT/RRT)">Escalation Management Team (EMT/RRT)</span>
                                    </h1>
                                </div>
                            </div>
                            <p class="slds-page-header__name-meta">New Escalation</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main page -->
        <template if:true={isWelcomeNote}>
            <div class="slds-m-around_large slds-align_absolute-center">
                <lightning-layout multiple-rows="true">
                    <lightning-layout-item class="slds-text-heading_large slds-align_absolute-center" padding="around-small" size="12">
                        Welcome to Escalation page!
                    </lightning-layout-item>
                    <lightning-layout-item class="slds-text-heading_small slds-align_absolute-center" padding="around-small" size="12">
                        &#9733;&nbsp;For any escalations involving US FedRAMP or US Federal secure customers, these cases will have to be managed exclusively by US citizen EMT incident managers residing on US soil.
                    </lightning-layout-item>
                    <lightning-layout-item class="slds-text-heading_small slds-align_absolute-center" padding="around-small" size="12">
                        Please proceed further to create Escalation Ransomware/Support Records.
                    </lightning-layout-item>
                </lightning-layout>
            </div>
            <!-- buttons -->
            <div class="slds-m-top_xx-large slds-align_absolute-center">
                <lightning-button variant="brand"
                                    title="Proceed"
                                    type="submit"
                                    name="Proceed"
                                    label="Proceed"
                                    onclick={handleProceed}></lightning-button>
            </div>
        </template>

        <!-- Escalation Ransomware/Support Record Create/Edit Form -->
        <template if:false={isWelcomeNote}>

            <!-- Draft button visible only when draft escalation exists -->
            <template if:true={isDraft}>  
                <!-- Draft Options modal -->
                <div class="demo-only slds-backdrop slds-backdrop_open" style="height: 640px;">
                    <section role="dialog" tabindex="-1" aria-label="Meaningful description of the modal content" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                        <div class="slds-modal__container">
                            <header class="slds-modal__header">
                                <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">You have unsaved draft escalation.</h2>
                            </header>
                            <div class="slds-modal__content slds-p-around_xx-large" style="height: 10rem;">
                                <lightning-layout if:true={isDraft}>
                                    Last record was saved as Draft, Please Edit/Delete before creating new Escalation record.<i><lightning-button variant="destructive" 
                                        label="DRAFT" 
                                        title="destructive" 
                                        class="slds-m-left_x-small">
                                        </lightning-button></i>
                                    <lightning-button-menu alternative-text="Show menu" onselect={handleDraftOptions} icon-name="utility:edit">
                                        <lightning-menu-item value="edit" label="Edit"></lightning-menu-item>
                                        <lightning-menu-item value="delete" label="Delete"></lightning-menu-item>
                                    </lightning-button-menu>
                                </lightning-layout>
                            </div>
                        </div>
                    </section>
                    <div class="slds-backdrop slds-backdrop_open"></div>
                </div>
            </template>

            <!-- Continue with Draft edit record / New record -->
            <div class="slds-grid">
                <!-- dropdown for Ransomware / Support -->
                <div class="slds-size_8-of-12 slds-col_bump-right">
                    <!-- Escaltions type Options -->
                    <lightning-combobox name="type" 
                                    label="Type" 
                                    value={value} 
                                    placeholder="Select Type" 
                                    options={options}
                                    onchange={handleTypeChange} 
                                    class="slds-var-m-around_medium dropValues"></lightning-combobox>
                </div>
                
                <!-- Draft Options and Home Icon-->
                <div class="slds-m-top_xx-large slds-size_4-of-12">
                    <lightning-layout style="padding-left: 90%;">
                        <lightning-icon icon-name="utility:home" 
                                            alternative-text="Home!" 
                                            title="Home"
                                            onclick={handleLoadMainPage}
                                            style="cursor: pointer;"></lightning-icon>
                    </lightning-layout><br/>
                </div>
            </div>

            <!-- Escalations Type templates -->
            <lightning-accordion class="example-accordion" active-section-name={value}>
                <!-- Render Templates -->
                <template if:true={templateInfo}>
                    <c-escalation-template template-detail={templateInfo}
                                            sobject-name={sobjectName}
                                            onescalationchange={hanldeescalationchange}
                                            onloadmainpage={handleLoadMainPage}></c-escalation-template>
                </template>
            </lightning-accordion>
        </template>
    </div>
    
</template>
