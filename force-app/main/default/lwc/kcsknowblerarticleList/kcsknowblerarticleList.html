<template>
  <template if:false={articleListData.showEditDetailPage}>
      <template if:false={noLoading}>
          <template if:false={articleListData.showConfiguration}>
              <div class={flexipageregionwidth}>
                  <div class="searchbar_mobile_view customsearchbar">
                      <c-knowbler-article-searchbar searchtext={articleListData.searchText}
                          class="article_searchbar" onsearchvaluechange={searchvaluechange}
                          flexipageregionwidth={flexipageregionwidth}>
                      </c-knowbler-article-searchbar>
                      <c-kcsknowblerlanguage-dropdown currentuserlanguage={articleListData.userLanguage}
                          picklistvalues={pickListValues} onlanguagevaluechange={languagevaluechange}
                          flexipageregionwidth={flexipageregionwidth}></c-kcsknowblerlanguage-dropdown>
                  </div>
                  <template if:true={flexipageregionwidth}>
                      <div class="side">
                          <div class="draftarticle">
                              All Draft articles
                          </div>
                          <div class="agentdivsmall">
                              <div class="agenttext">
                                  <span>Agent :</span>
                              </div>
                              <lightning-combobox name="Agents" value={value} placeholder="Agent" options={usersArray}
                                  onchange={handleChange} dropdown-alignment="right" variant="label-hidden"
                                  class="combobox">
                              </lightning-combobox>
                          </div>
                      </div>
                  </template>
                  <template if:false={flexipageregionwidth}>
                      <div class="draftarticlelarge">
                          All Draft articles
                      </div>
                  </template>
                  <div class="slds-grid slds-grid_align-spread searchbar_desktop_view customsearchbar">

                          flexipageregionwidth={flexipageregionwidth}></c-knowbler-article-searchbar>

              <c-knowbler-create-article-button class="slds-col" oncreatearticle={createArticle}>
              </c-knowbler-create-article-button>
                -->

                              <div class="agenttext">
                                  <span>Agent :</span>
                              </div>

                                  class="agentlist">
                              </lightning-combobox>
                          </div>
                          <c-kcsknowblerlanguage-dropdown currentuserlanguage={articleListData.userLanguage}
                              picklistvalues={pickListValues} onlanguagevaluechange={languagevaluechange}
                              flexipageregionwidth={flexipageregionwidth} class="slds-col ">
                          </c-kcsknowblerlanguage-dropdown>
                      </div>
                  </div>

                  </div>
