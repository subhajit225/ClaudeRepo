<template>
  <div class={largescreen}>
    <template if:false={alreadyevaluated}>
      <template if:false={waiting}>
        <template if:false={languagechanged}>
          <div class="projectedScoreOnClick">
            <div
              class="projectedScore score"
              onmouseover={handlehover}
              onmouseout={handlehoverout}
              onclick={handleProjectedScore}
            >
              <span style="margin-bottom: 2px">
                <img
                  src={predictimg}
                  alt="tick Image"
                  height="20px"
                  width="20px"
                />
              </span>
              <span class="predictedScoreText"
                >Predicted Score : {predictedscore}%
              </span>
              <lightning-icon
                class="predictedScoreArrowIcon"
                icon-name="utility:forward"
                alternative-text="Chat"
                title="Chat"
                size="xx-small"
              ></lightning-icon>
            </div>
          </div>
        </template>
      </template>
    </template>
    <template if:true={predictedScoreLoading}>
      <template if:false={languagechanged}>
        <div>
          <div class="loadingPredictedScore">
            <lightning-icon
              class="predictedScoreIcon"
              icon-name="utility:chat"
              alternative-text="Chat"
              title="Chat"
              size="xx-small"
            ></lightning-icon
            ><span class="loadingPredictedScoreText"
              >Loading Predicted Score</span
            >
            <span class="container" data-pct="78">
              <svg>
                <!-- <circle r="10" cx="12" cy="12" fill="transparent" class="progressBackground" stroke-dasharray="314"></circle> -->
                <circle
                  r="10"
                  cx="28"
                  cy="12"
                  fill="transparent"
                  class="progress"
                  stroke-dashoffset="50"
                  stroke-dasharray="100"
                  stroke-linecap="butt"
                  transform="rotate(270,20,20)"
                ></circle>
              </svg>
            </span>
          </div>
        </div>
      </template>
    </template>
    <template if:true={alreadyevaluated}>
      <div class="evaluated">
        <span class="checkedimg">
          <img src={evaluateimg} alt="tick Image" height="16px" width="16px" />
        </span>
        <span onclick={handlealreadyevaluated}>Already evaluated</span>
      </div>
    </template>
    <template if:true={waiting}>
      <template if:false={languagechanged}>
        <div>
          <lightning-icon
            class="spinner"
            icon-name="utility:spinner"
            alternative-text="Chat"
            title="Chat"
            size="xx-small"
          ></lightning-icon>
          <span class="predictedScoreText">Waiting for score prediction</span>
        </div>
      </template>
      <div class="projectedScoreOnClick">
        <div
          class="projectedScore evaluatebutton"
          onmouseover={handlehover}
          onmouseout={handlehoverout}
          onclick={handleProjectedScore}
        >
          <span class="predictedScoreText evaluatetext">Evaluate</span>
          <lightning-icon
            class="predictedScoreArrowIcon"
            icon-name="utility:forward"
            alternative-text="Chat"
            title="Chat"
            size="xx-small"
          ></lightning-icon>
        </div>
      </div>
    </template>
    <template if:true={showEvaluationInProgressAlert}>
      <div class="knowbler__salesforce-evaluation-alert-popup-overlay" onclick={closeEvaluationInProgressPopup}></div>
      <div class="knowbler__salesforce-evaluation-alert-popup-dialog">
        <div class="knowbler__salesforce-evaluation-alert-popup-content">
          <div class="knowbler__salesforce-evaluation-alert-popup-body">
            <div class="knowbler__salesforce-evaluation-alert-popup-header">
              <svg id="notifications_active_black_24dp" xmlns="http://www.w3.org/2000/svg" width="16.61" height="16.61" viewBox="0 0 16.61 16.61">

              </svg>
              <span>Alert</span>

                    <path id="Path_18362" data-name="Path 18362" d="M34.594,0H6.406A6.414,6.414,0,0,0,0,6.406V22.1a6.414,6.414,0,0,0,6.406,6.406h3A11.2,11.2,0,0,0,27.21,35.882l4.649,4.649a1.6,1.6,0,1,0,2.265-2.265l-4.649-4.649A11.209,11.209,0,1,0,9.4,25.3h-3a3.207,3.207,0,0,1-3.2-3.2V6.406a3.207,3.207,0,0,1,3.2-3.2H34.594a3.207,3.207,0,0,1,3.2,3.2V22.1A3.206,3.206,0,0,1,35.425,25.2a1.6,1.6,0,0,0,.828,3.094A6.414,6.414,0,0,0,41,22.1V6.406A6.414,6.414,0,0,0,34.594,0ZM20.5,18.9a8.008,8.008,0,1,1-8.008,8.008A8.017,8.017,0,0,1,20.5,18.9Z" fill="#7e34ec"/>

                </svg>
              </div>
              <span>
                You cannot evaluate this article as it is currently being evaluated
                by another reviewer
              </span>
            </div>
            <div
              class="knowbler__salesforce-evaluation-alert-button"
              onclick={closeEvaluationInProgressPopup}
            >
              <span>Go back to article list </span>
              <svg
                id="arrow-forward"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 18 18"
                class="knowbler__salesforce-icon"
              >
                <g id="arrow-forward-2" data-name="arrow-forward">
                  <g id="arrow-forward-3" data-name="arrow-forward">

                      height="18"
                      transform="translate(18) rotate(90)"

                    />

                </g>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
