<template>
  <lightning-tabset class="su_loading_dark" active-tab-value={activevalue}>
    <template if:true={tabs}>
      <template for:each={tabs} for:item="tab">
        <lightning-tab
          label={tab.label}
          key={tab.value}
          value={tab.value}
          onactive={handleActive}
          class="su_loading_dark"
        >
        </lightning-tab>
      </template>
    </template>
  </lightning-tabset>
  <div class="su_border_bottom"></div>
</template>
