<template>
  <div class={flexipageregionwidth}>
    <div class="outer_manage_article" onclick={closeDropdown}>
      <div class="modal_view_manage_back_button">
        <img
          onclick={closeManageArticle}
          src={backButton}
          alt="Failed to Load"
        />
      </div>
      <div class="manage_article_main" onclick={closeDropdown}>
        <img
          class="manage_back_button"
          onclick={closeManageArticle}
          src={backButton}
          alt="Failed to Load"
        />
        <div class="manage_article">
          <div class="manage_left">
            <div class="">
              <lightning-avatar
                variant="circle"
                src={detailarticle.SmallPhotoUrl}
                fallback-icon-name="standard:person_account"
                alternative-text={detailarticle.Owner.Name}
              ></lightning-avatar>
            </div>
            <template if:true={detailarticle.Owner}>
              <div class="slds-truncate article_username">
                {detailarticle.Owner.Name}
              </div>
            </template>
            <div class="article_number">{detailarticle.ArticleNumber}</div>
          </div>
          <div class="d-flex inner_top_right_content">
            <div
              class="slds-dropdown-trigger slds-dropdown-trigger_click edit_button"
            >
              <div class="edit-article" onclick={openCloseDropdown}>
                <img src={editArticle} alt="Error to load" />
              </div>
              <div class="slds-dropdown slds-dropdown_right">
                <ul class="slds-dropdown__list" role="menu">
                  <li
                    class="slds-dropdown__item"
                    role="presentation"
                    onclick={openSubTab}
                  >
                    <div class="manage_salesforce">
                      <img
                        class="manage_salesforce_icon"
                        src={manage}
                        alt="failed to load"
                      />
                      Manage in Salesforce
                    </div>
                  </li>
                  <template if:true={showEdit}>
                    <li onclick={openEdit}>
                      <div class="edit_article">
                        <img
                          class="manage_salesforce_icon"
                          src={edit}
                          alt="failed to load"
                        />
                        Edit Article
                      </div>
                    </li>
                  </template>
                </ul>
              </div>
            </div>
          </div>
        </div>
        <div class="manage_form">
          <template if:false={norecordtypes}>
            <lightning-record-view-form
              record-id={currentid}
              record-type-id={recordtypeID}
              object-api-name={destobj}
              onerror={handleViewFormError}
            >
              <!-- <template for:each={currentArticleDetail} for:item="item"><div class="manage_title d-flex-column"  key={item.label}><div class="font_family text_truncate">{item.label}</div><template if:true={item.isstring}><div class="detailed_text">{item.value}</div></template><template if:true={item.isdate}><div class="detailed_text">{item.value}</div></template><template if:true={item.ispicklist}><div class="detailed_text">{item.value}</div></template><template if:true={item.isfile}><div class="detailed_text">{item.value}</div><template if:false={norecordtypes}><lightning-record-view-form record-id={currentid} object-api-name="Knowledge__kav"><template for:each={currentArticleDetail} for:item="item"><div class="manage_title d-flex-column"  key={item.label}><div class="font_family text_truncate">{item.label}</div><template if:true={item.isstring}><div class="detailed_text">{item.value}</div></template><template if:true={item.isdate}><div class="detailed_text">{item.value}</div></template><template if:true={item.ispicklist}><div class="detailed_text">{item.value}</div></template><template if:true={item.isfile}><div class="detailed_text">{item.value}</div></template><template if:true={item.isPlainTextArea}><div class="detailed_text">{item.value}</div></template><template if:true={item.isRichTextArea}><lightning-formatted-rich-text class="detailed_text" value={item.value}></lightning-formatted-rich-text></template><template if:true={item.isurl}><div class="detailed_text">{item.value}</div></template><template if:true={item.isphone}><div class="detailed_text">{item.value}</div></template><template if:true={item.isemail}><div class="detailed_text">{item.value}</div></template><template if:true={item.iscurrency}><div class="detailed_text">{item.value}</div></template><template if:true={item.ispercent}><div class="detailed_text">{item.value}</div></template><template if:true={item.isdatetime}><div class="detailed_text">{item.value}</div></template><template if:true={item.isreference}><div class="detailed_text">{item.value}</div></template><template if:true={item.isdouble}><div class="detailed_text">{item.value}</div></template><template if:true={item.ismultipicklist}><div class="detailed_text">{item.value}</div></template><template if:true={item.isboolean}><lightning-input class="detailed_text manage_checkbox" checked={item.value} type="checkbox" data-id="checkbox" disabled></lightning-input></template></div><div class="border_bottom" key={item.key}></div></template> -->
              <template for:each={currentArticleDetail} for:item="item">
                <div class="manage_title d-flex-column" key={item.label}>
                  <label for={item.label} class="font_family text_truncate"
                    >{item.label}</label
                  >
                  <lightning-output-field
                    class="detailed_text"
                    id={item.label}
                    variant="label-hidden"
                    field-name={item.name}
                  ></lightning-output-field>
                </div>
                <div class="border_bottom" key={item.key}></div>
              </template>
              <template if:true={hasFileUploadPermission}>
                <div class="manage_title d-flex-column">
                  <div class="font_family text_truncate">Attachment</div>
                  <div class="knowbler__uploaded-files-section">
                    <template if:false={loadFilesList}>
                      <template for:each={allFilesList} for:item="fileInfo" for:index="index">
                        <div class="knowbler__upload-files-list-wrapper" key={fileInfo.documentId}>
                          <div class="knowbler__upload-file-wrapper">
                            <div class="knowbler__upload-file-icon">
                              <lightning-icon icon-name={fileInfo.fileIcon} size="small" alternative-text="File"></lightning-icon>
                            </div>
                            <a class="knowbler__upload-file-name" href={fileInfo.fileLink} target="_blank">{fileInfo.name}</a>
                          </div>
                        </div>
                      </template>
                    </template>
                    <template if:true={loadFilesList}>
                      <div class="knowbler__file-upload-loader-wrapper">
                        <div class="knowbler__load-file-text">Please wait...</div>
                        <div class="knowbler__custom-loader"></div>
                      </div>
                    </template>
                  </div>
                </div>
                <div class="border_bottom"></div>
              </template>
              <div class="manage_title d-flex-column">
                <div class="font_family text_truncate">Data Category</div>
                <template for:each={datacat} for:item="item">
                  <div key={item.label} class="detailed_text">
                    {item.label} : {item.value}
                  </div>
                </template>
              </div>
              <div class="border_bottom"></div>
              <div class="border_bottom_last"></div>
            </lightning-record-view-form>
          </template>
          <template if:true={norecordtypes}>
            <div class="manageForm" style="display: none">
              <lightning-record-edit-form
                record-type-id={recordtypeID}
                object-api-name={destobj}
                onload={handleLoadView}
                onerror={handleEditFormError}
              ></lightning-record-edit-form>
              <!-- <lightning-record-form mode="readonly" record-type-id={recordtypeID} record-id={currentid} object-api-name="Knowledge__kav" layout-type="Full"></lightning-record-form> -->
              <!--<div class="manage_title d-flex-column"><div class="font_family text_truncate">Data Category</div><template for:each={datacat} for:item="item"><div key={item.label} class="detailed_text">{item.label} : {item.value}</div></template></div><div class="border_bottom"></div><div class="border_bottom_last"></div> -->
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
  <c-knowbler-modal-component></c-knowbler-modal-component>
</template>
