<template>
  <!-- To show publish now/schedule publish modal -->
  <template if:true={ispublish}>
    <div id="articlePublishModal" class="displayModal">
      <section class="modal slds-fade-in-open modalpublish publishsuccess">
        <div class="slds-modal__content model-content">
          <c-knowbler-publish-article-options
            client-settings={clientSettings}
            onclosemodal={closePublishModal}
            onpublishnow={publishnow}
            onschedulepublish={schedulepublish}
            ispublishattach={ispublishattach}
            onreferencenow={referencenow}
            onresolutionnow={resolutionnow}
            onreferenceschedule={referenceschedule}
            onresolutionschedule={resolutionschedule}
            caseid={caseid}
            casenumber={casenumber}
            jwttoken={jwttoken}
            endpoint={endpoint}
          >
          </c-knowbler-publish-article-options>
        </div>
      </section>
    </div>
  </template>
  <!-- Reference/Resoltuion options for Attach to case -->
  <template if:true={isattach}>
    <div id="articleattach" class="displayModal">
      <section class="modal slds-fade-in-open modalpublish publishsuccess">
        <div class="slds-modal__content model-content">
          <c-knowbler-publish-article-options
            client-settings={clientSettings}
            oncloseattach={closeattach}
            isattach={isattach}
            onattachreference={attachreference}
            onattachresolution={attachresolution}
            caseid={caseid}
            emailclicked={emailclicked}
            commentclicked={commentclicked}
            onclickedcommentreference={clickedcommentreference}
            onclickedemailreference={clickedemailreference}
            onclickedcommentresolution={clickedcommentresolution}
            onclickedemailresolution={clickedemailresolution}
            casenumber={casenumber}
            jwttoken={jwttoken}
            endpoint={endpoint}
            kcslabel={kcslabel}
          >
          </c-knowbler-publish-article-options>
        </div>
      </section>
    </div>
  </template>

  <!-- Article publish successfully -->
  <template if:true={ispublishnowsuccess}>
    <div id="publishnow" class="displayModal">
      <section class="modal modalSuccess slds-fade-in-open modalpublish">
        <div class="slds-modal__content model-content">
          <c-knowbler-article-publish-success
            ispublishnow={ispublishnowsuccess}
          >
          </c-knowbler-article-publish-success>
        </div>
      </section>
    </div>
  </template>
  <!-- Article publish and attach successfully -->
  <template if:true={articleattach}>
    <div id="schedulepublish" class="displayModal">
      <section class="modal modalSuccess slds-fade-in-open modalpublish">
        <div class="slds-modal__content model-content">
          <c-knowbler-article-publish-success articleattach={articleattach}>
          </c-knowbler-article-publish-success>
        </div>
      </section>
    </div>
  </template>
  <!-- link copied -->
  <template if:true={linkcopied}>
    <div id="linkcopied" class="displayModal">
      <section class="modal modalSuccess slds-fade-in-open modalpublish">
        <div class="slds-modal__content model-content">
          <c-knowbler-article-publish-success publish linkcopied>
          </c-knowbler-article-publish-success>
        </div>
      </section>
    </div>
  </template>
  <!-- Article attach to case successfully  -->
  <template if:true={attachsuccesfull}>
    <div id="attachsuccessfull" class="displayModal">
      <section class="modal modalSuccess slds-fade-in-open modalpublish">
        <div class="slds-modal__content model-content">
          <c-knowbler-article-publish-success
            publish
            attacharticle
            articleattachpublished
          >
          </c-knowbler-article-publish-success>
        </div>
      </section>
    </div>
  </template>
  <!-- Article deatched from  case successfully  -->
  <template if:true={detachsuccesfull}>
    <div id="deatchsuccessfull" class="displayModal">
      <section class="modal modalSuccess slds-fade-in-open modalpublish">
        <div class="slds-modal__content model-content">
          <c-knowbler-article-publish-success
            publish
            attacharticle
            articledetach
          >
          </c-knowbler-article-publish-success>
        </div>
      </section>
    </div>
  </template>

  <template if:true={stayleave}>
    <div data-id="alertModal" class={classKey}>
      <section class="modal leave">
        <header class="modal-header">
          <img class="imgCenter" src={stayLeave} alt="Close"/>
        </header>
        <div class="modal-content">
          <div class="contentMsg">
            <p class="message">You'll need to start again.</p>
            <p class="message submessage">Are you sure you want to leave?</p>
            <div class="modalButton">
              <a onclick={changeCSSStay} class="btn btnStay"> No,Stay </a>
              <a onclick={handleLeave} class="btn btnLeave"> Yes, Leave </a>
            </div>
          </div>
        </div>
      </section>
    </div>
  </template>

  <template if:true={showvideo}>
    <div data-id="alertModal" class="displayModal">
      <section class="modal">
        <div class="modal-content">
          <div class="slds-m-top_small embeddVideoDiv">
            <div class="customTextEditorContent">
              <div class="header">
                <div class="mediaHeading">Embed Video</div>
                <div
                  class="closeModal"
                  onclick={errorModal}
                  data-id="errorModal"
                >
                  <img src={close} alt="Close" />
                </div>
              </div>
              <div class="inputDiv">
                <label class="inputVideoLabel"
                  >Paste &lt;iframe&gt; code here to embed video</label
                >
                <lightning-textarea
                  class="textAreaBody slds-p-top_x-small"
                  data-id="videoLink"
                  value={videolink}
                  variant="label-hidden"
                ></lightning-textarea>
              </div>
              <div class="exampleSection slds-p-top_medium">
                <div class="exampleText">
                  Example:&lt;iframe width="560" height="315"
                  src="https://www.youtube.com/embed/KcOm0TNvKBA"
                  frameborder="0" allowfullscreen&gt;&lt;/iframe&gt;
                </div>
              </div>
              <div class="footerContent slds-p-top_large">
                <lightning-button
                  variant="bare"
                  label="Embed Video"
                  value={videolink}
                  onclick={handleSave}
                >
                </lightning-button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </template>

  <template if:true={createsuccess}>
    <div id="articleSuccessModal" class="displayModal">
      <section class="modalSuccess">
        <header class="modal-header">
          <template if:true={successData.iscreate}>
            <img class="imgCenter" src={articleSuccessful} alt="Article Successful"/>
          </template>
          <template if:true={successData.isupdate}>
            <img class="imgCenter" src={articleUpdate} alt="Article Update"/>
          </template>

          <template if:true={successData.isvideo}>
            <img class="imgCenter" src={videoEmbed} alt="Video"/>
          </template>
          <template if:true={successData.isimage}>
            <img class="imgCenter" src={imageInserted} alt="Image"/>
          </template>
          <template if:true={successData.issmartLink}>
            <img class="imgCenter" src={smartLink} alt="Smart Link"/>
          </template>
        </header>
        <div class="modal-content">
          <div class="contentMsg">
            <p class="messageSuccess">{successMessage}</p>
          </div>
        </div>
      </section>
    </div>
  </template>
  <template if:true={saveprog}>
    <div id="articleSaveProgress" class="displayModal">
      <section class="modalProgress">
        <header class="modal-header">
          <img class="imgCenterProgress" src={saveProgress} alt="Progress"/>
        </header>
        <div class="modal-content">
          <div class="contentMsg">
            <p class="message">Saving in progress</p>
          </div>
        </div>
      </section>
    </div>
  </template>
  <template if:true={errorsuccess}>
    <div id="articleErrorModal" data-id="errorModal" class={classKey}>
      <section class="modalError">
        <header class="modal-header">
          <h1 class="message">Error</h1>
        </header>
        <div class="modal-content">
          <div class="contentMsg">
            <template if:false={showArticleNotExistsPopup}>
              <img class="imgCenterError" src={errorImg} alt="Error"/>
            </template>
            <template if:true={showArticleNotExistsPopup}>
              <img
                class="imgCenterError"
                style="width: auto"
                alt="Article Unavailable"
                src={articleNotExists}
              />
            </template>
            <p class="message">{errorMessage}</p>
          </div>
        </div>
        <footer class="modalFooter">
          <a onclick={errorModal} class="btnTwo"> OK </a>
        </footer>
      </section>
    </div>
  </template>
