<template>
  <div class="su_pagination">
    <lightning-layout>
      <lightning-layout-item>
        <lightning-button
          icon-name="utility:chevronleft"
          onclick={previousHandler}
          disabled={disablePrevious}
          data-id="previous"
        ></lightning-button>
      </lightning-layout-item>
      <template for:each={pageArr} for:item="item">
        <lightning-layout-item key={item.value}>
          <lightning-button
            label={item.value}
            name={item.value}
            onclick={changePage}
            data-id={item.value}
            class={customChanges}
            disabled={item.isDisabled}
          ></lightning-button>
        </lightning-layout-item>
      </template>
      <lightning-layout-item>
        <lightning-button
          icon-name="utility:chevronright"
          icon-position="right"
          onclick={nextHandler}
          disabled={disableNext}
          data-id="next"
        ></lightning-button>
      </lightning-layout-item>
    </lightning-layout>
  </div>
</template>
