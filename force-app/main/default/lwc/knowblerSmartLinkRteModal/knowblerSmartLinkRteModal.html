<template>
  <template if:true={showModal}>
    <div data-id="alertModal" class="displayModal">
      <section class="modal smart_link_modal">
        <div class="closeImgPopup" onclick={closeModal}>
          <img src={close} alt="error" />
        </div>
        <div class="smartlinkDiv">
          <div class="picklists">
            <div class="langPicklist">
              <lightning-combobox
                name="Language"
                label="Language"
                value={language}
                placeholder="Select Language"
                options={langPicklist}
                onchange={handleLanguageChange}
                required
              ></lightning-combobox>
            </div>
            <div class="statusPicklist">
              <lightning-combobox
                name="Status"
                label="Status"
                value={status}
                placeholder="Select Status"
                options={publishSatusPicklist}
                onchange={handleStatusChange}
                required
              ></lightning-combobox>
            </div>
          </div>
          <div class="articlesLookup slds-m-top_small">
            <div
              class="slds-form-element"
              onmouseleave={toggleResult}
              data-source="lookupContainer"
            >
              <div class="slds-combobox_container slds-has-selection">
                <label class="slds-form-element__label" for="combobox-id-1"
                  >{label}</label
                >
                <div
                  class="lookupInputContainer slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click"
                  aria-expanded="false"
                  aria-haspopup="listbox"
                  role="combobox"
                >
                  <div
                    class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right"
                    role="none"
                  >
                    <div class="searchBoxWrapper slds-show">
                      <lightning-input
                        type="search"
                        data-source="searchInputField"
                        onchange={handleKeyChange}
                        is-loading={isSearchLoading}
                        value={searchKey}
                        variant="label-hidden"
                        placeholder={placeholder}
                      ></lightning-input>
                    </div>

                    <div class="pillDiv slds-hide">
                      <span
                        class="slds-icon_container slds-combobox__input-entity-icon"
                      >
                        <lightning-icon
                          icon-name={iconName}
                          size="x-small"
                          alternative-text="icon"
                        ></lightning-icon>
                      </span>
                      <template if:true={selectedRecord}>
                        <input
                          type="text"
                          id="combobox-id-1"
                          value={selectedRecord.Title}
                          class="slds-input slds-combobox__input slds-combobox__input-value"
                          readonly
                        />
                      </template>
                      <button
                        type="button"
                        class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                        title="Remove selected option"
                        onclick={handleRemove}
                      >
                        <lightning-icon
                          icon-name="utility:close"
                          size="x-small"
                          alternative-text="close icon"
                        ></lightning-icon>
                      </button>
                    </div>
                  </div>

                  <div
                    style="margin-top: 0px"
                    id="listbox-id-5"
                    class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid"
                    role="listbox"
                  >
                    <ul
                      class="slds-listbox slds-listbox_vertical"
                      role="presentation"
                    >
                      <template for:each={searchedArticles} for:item="obj">
                        <li
                          key={obj.Id}
                          role="presentation"
                          class="slds-listbox__item"
                        >
                          <div
                            data-recid={obj.Id}
                            onclick={handelSelectedRecord}
                            class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta"
                            role="option"
                          >
                            <span
                              style="pointer-events: none"
                              class="slds-media__figure slds-listbox__option-icon"
                            >
                              <span class="slds-icon_container">
                                <lightning-icon
                                  icon-name={iconName}
                                  size="small"
                                  alternative-text="icon"
                                ></lightning-icon>
                              </span>
                            </span>
                            <span
                              style="pointer-events: none"
                              class="slds-media__body"
                            >
                              <span
                                class="slds-listbox__option-text slds-listbox__option-text_entity"
                                >{obj.Title}</span
                              >
                            </span>
                          </div>
                        </li>
                      </template>

                      <template if:false={hasRecords}>
                        <li
                          class="slds-listbox__item"
                          style="text-align: center; font-weight: bold"
                        >
                          No Records Found....
                        </li>
                      </template>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="targetPicklist slds-m-top_small">
            <lightning-combobox
              name="Target"
              label="Target"
              value={targetValue}
              placeholder="Select Target"
              options={targetOptions}
              onchange={handleTargetChange}
            ></lightning-combobox>
          </div>
          <lightning-button
            label="Save Smart Link"
            title="Non-primary action"
            onclick={saveSmartLink}
            class="slds-m-left_x-small smart_link_btn"
          ></lightning-button>
        </div>
      </section>
    </div>
  </template>
</template>
