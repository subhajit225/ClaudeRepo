<template>
    <lightning-spinner if:true={showSpinner} alternative-text="Loading" size="medium"></lightning-spinner>

    <div if:true={error} class="slds-notify_container slds-is-relative">
        <div class="slds-notify slds-notify_toast slds-theme_error" role="alert">
            <div class="slds-notify__content">
                <h2 class="slds-text-heading_small">An error occurred!</h2>
                <p>{error}</p>
            </div>
        </div>
    </div>

    <template if:true={isDraft}>
        <!-- Draft Options -->
        <div class="slds-p-around_medium slds-align_absolute-center slds-size_12-of-12">
            <!-- Draft button visible only when draft Lessons learned exists -->
            <lightning-layout if:true={isDraft}>
                Last record was saved as Draft, Please Edit/Delete before creating new Lessons Learned record.<i><lightning-button variant="destructive" 
                    label="DRAFT" 
                    title="destructive" 
                    class="slds-m-left_x-small">
                    </lightning-button></i>
                <lightning-button-menu alternative-text="Show menu" onselect={handleDraftOptions} icon-name="utility:edit">
                    <lightning-menu-item value="edit" label="Edit"></lightning-menu-item>
                    <lightning-menu-item value="delete" label="Delete"></lightning-menu-item>
                </lightning-button-menu>
            </lightning-layout>
        </div>
    </template>
    <!-- New Record / Edited draft record -->
    <lightning-record-edit-form if:false={isDraft} record-id={draftLlId} object-api-name={sobjectName} density="comfy" onsuccess={handleSuccess} onsubmit ={handleSubmit}>
        <lightning-messages> </lightning-messages>
        
        <div class="">
            <!-- header -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium slds-hyphenate">New Lessons Learned</h2>
            </header>

            <!-- form -->
            <div class="slds-box slds-grid slds-wrap slds-p-around--medium">
                <template if:true={lessonLearnedTemplateFields} for:each={lessonLearnedTemplateFields} for:item="fld">
                    <div key={fld} class="slds-col slds-size_6-of-12 slds-p-horizontal_medium">
                        <lightning-input-field field-name={fld} name={fld} onchange={handleChange}> </lightning-input-field>
                    </div>
                </template>
                <div class="slds-p-left_large">
                    <lightning-input type="text" label="Reported By" value={currentUserName} disabled> </lightning-input>
                </div>
                <div class="slds-p-top_x-large slds-p-left_large">
                    <span if:true={draftLastModifiedDate}> Draft last saved <lightning-formatted-date-time value={draftLastModifiedDate} 
                        year="2-digit" 
                        month="short" 
                        day="2-digit" 
                        hour="numeric"
                        weekday="short" 
                        minute="2-digit"></lightning-formatted-date-time></span>
                </div>
            </div>
            
            <!-- buttons -->
            <footer class="slds-modal__footer">
                <div class="slds-align_absolute-center">
                    <lightning-button class="slds-m-right_medium"
                                        title="Cancel"
                                        name="Cancel"
                                        label="Cancel"
                                        onclick={handleCancel}></lightning-button>
                    <lightning-button variant="brand"
                                        title="Save"
                                        type="submit"
                                        name="Save"
                                        label="Save"></lightning-button>
                </div>
            </footer>
        </div>
    </lightning-record-edit-form>

    <!-- Recent Cases -->
    <lightning-accordion allow-multiple-sections-open="true" active-section-name="A" class="slds-section">
        <lightning-accordion-section name="A" label="Recent Cases">
            <lightning-layout padding="around-small" class="slds-p-around_small slds-align_absolute-center">
                <lightning:layoutItem>
                    <lightning-button variant="brand" 
                                        name="OpenCases"
                                        label="Open Cases"
                                        onclick={handleOpenCases}>
                    </lightning-button>
                </lightning:layoutItem>
                <lightning:layoutItem>
                    <lightning-button variant="brand" 
                                        name="ClosedCases"
                                        label="Closed Cases" 
                                        onclick={handleClosedCases}
                                        class="slds-m-left_small">
                </lightning-button>
                </lightning:layoutItem>
                <lightning:layoutItem>
                    <lightning-button variant="brand" 
                                        name="RelatedCases"
                                        label="Related Cases" 
                                        onclick={handleRelatedCases}
                                        class="slds-m-left_small">
                        </lightning-button>
                </lightning:layoutItem>
            </lightning-layout>

            <div class="slds-scrollable_y" style="height:25rem;">
                <lightning-datatable key-field="id"
                                        data={caseList}
                                        columns={columns}
                                        hide-checkbox-column>
                </lightning-datatable>
            </div>
        </lightning-accordion-section>
    </lightning-accordion>
</template>
