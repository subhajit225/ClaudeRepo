<template>
    <!-- End Header Label Passed from Parent -->
  <div class="slds-combobox_container">
        <div>  
            <!-- Search Input -->
            <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                <lightning-input class="inputBox" label={label} placeholder={searchString} onblur={handleBlur} onclick={showOptions} id="combobox-id-1" ></lightning-input>
                <lightning-icon class="slds-input__icon" icon-name="utility:down" size="x-small" alternative-text="downicon" style="margin: 4px;"></lightning-icon>
            </div>
            <!-- Dropdown List -->
            <template if:true={showDropdown}>
                <div id="listbox-id-1" class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" >
                    <ul class="slds-listbox slds-listbox_vertical recordListBox" role="presentation">
                            <template for:each={optionData} for:item="option">
                                <li key={option.value} data-id={option.value} onmousedown={selectItem} class="slds-listbox__item eachItem">
                                    <template if:true={option.selected}>
                                        <lightning-icon icon-name="utility:check" size="xx-small" alternative-text="icon" ></lightning-icon>
                                    </template>
                                    <span class="slds-media slds-listbox__option_entity verticalAlign slds-truncate">{option.label}</span>
                                </li>
                            </template>
                        <template if:true={noResultMessage} >
                            <li class="slds-listbox__item">
                                <span class="slds-media slds-listbox__option_entity verticalAlign slds-truncate">{noResultMessage}</span>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>
        </div>
    </div>
    <!-- Multi Select Pills -->
    <template for:each={optionData} for:item="option">
        <template if:true={option.selected}>
            <lightning-pill label={option.label} key={option.value} name={option.value} onremove={closePill}>
                <lightning-icon icon-name="utility:success" alternative-text="Success!" variant="success"
            title="success variant small" size="xx-small"></lightning-icon>
            </lightning-pill>
        </template>
    </template>
</template>
