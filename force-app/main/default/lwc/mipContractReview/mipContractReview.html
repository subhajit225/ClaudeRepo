<template>
    <div>
        <div>
            <h2 class="sectionHeader">Contract Information</h2>
            <br></br>
            <lightning-record-form
                object-api-name={mipContractObj}
                fields={mipContractFields}
                onsuccess={handleSaveContract}
                columns = 2
                record-id={recId}>
            </lightning-record-form>
            <lightning-record-view-form
                object-api-name={mipContractObj}
                record-id={recId} >
                <template if:true={accordianFH}>
                <div class="slds-grid">
                    <div class="slds-col slds-size_1-of-2 slds-p-around_none">
                        <lightning-output-field field-name="Actual_Total_Funded_Head_Payout__c"> </lightning-output-field>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-output-field field-name="Max_Total_Funded_Head_Payout__c"> </lightning-output-field>
                    </div>
                </div>
                </template>
                <template if:true={mipElementRebate}>
                <div class="slds-grid">
                    <div class="slds-col slds-size_1-of-2 slds-p-around_none">
                        <lightning-output-field field-name="Actual_Rebate_Payout__c"> </lightning-output-field>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-output-field field-name="Max_Rebate_Payout__c"> </lightning-output-field>
                    </div>
                </div>
                </template>
                <div class="slds-grid">
                    <div class="slds-col slds-size_1-of-2 slds-p-around_none">
                        <lightning-output-field field-name="CDM__c"> </lightning-output-field>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-output-field field-name="Participating_Partner_Accounts__c"> </lightning-output-field>
                    </div>
                </div>
            </lightning-record-view-form>
        </div>
        <br></br>
        <div>
            <h2 class="sectionHeader">Contract Elements</h2>
            <lightning-accordion allow-multiple-sections-open  onsectiontoggle={handleSectionToggle}
                        active-section-name={activeSections}>
                
                <template if:true={accordianFH}>
                    <lightning-accordion-section name="Funded Head" label="Funded Head">
                        <lightning-datatable
                            key-field="Id"
                            data-id ="Funded Head"
                            data={mipElementFHRecs.data}
                            show-row-number-column
                            hide-checkbox-column
                            columns={mipElementFHColumns}
                            draft-values={saveDraftValues} 
                            onrowaction={showMilestones}
                            onsave={handleSaveFH}>
                        </lightning-datatable>
                    </lightning-accordion-section>
                </template>

                <template if:true={accordianRM}>
                    <lightning-accordion-section name="Rebate Milestone" label="Rebate Milestone">
                        <lightning-datatable
                            key-field="Id"
                            data-id ="Rebate Milestone"
                            data={mipElementRMRecs.data}
                            show-row-number-column
                            hide-checkbox-column
                            columns={mipElementRMColumns}
                            draft-values={saveDraftValues} 
                            onrowaction={showMilestones}
                            onsave={handleSaveRM}>
                        </lightning-datatable>
                    </lightning-accordion-section>
                </template>

                <template if:true={accordianPSNL}>
                    <lightning-accordion-section name="PSNL Bookings" label="Partner Sourced Bookings">
                        <lightning-datatable
                            key-field="Id"
                            data-id ="PSNL Bookings"
                            data={mipElementPSNLRecs.data}
                            show-row-number-column
                            hide-checkbox-column
                            columns={mipElementPSNLTotalColumns}
                            draft-values={saveDraftValues}
                            onsave={handleSavePSNL}>
                        </lightning-datatable>
                    </lightning-accordion-section>
                </template>

                <template if:true={accordianTotal}>
                    <lightning-accordion-section name="Total Bookings" label="Total Bookings">
                        <lightning-datatable
                            key-field="Id"
                            data-id ="Total Bookings"
                            data={mipElementTotalRecs.data}
                            show-row-number-column
                            hide-checkbox-column
                            columns={mipElementPSNLTotalColumns}
                            draft-values={saveDraftValues}
                            onsave={handleSaveTotal}>
                        </lightning-datatable>
                    </lightning-accordion-section>
                </template>

                <template if:true={accordianEnroll}>
                    <lightning-accordion-section name="Enrollment" label="Enrollment">
                        <lightning-datatable
                            key-field="Id"
                            data-id ="Enrollment"
                            data={mipElementEnrollRecs.data}
                            show-row-number-column
                            hide-checkbox-column
                            columns={mipElementEnrollColumns}
                            draft-values={saveDraftValues}
                            onsave={handleSaveEnroll}>
                        </lightning-datatable>
                    </lightning-accordion-section>
                </template>

            </lightning-accordion>
        </div>
      </div>
      <footer class="slds-modal__footer">
            <lightning-button variant="brand" label="Submit" title="Submit"  onclick={submit}></lightning-button>
        </footer>
      <template if:true={modalContainer}>
            <section  class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container modalSize">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModalAction}>
                           <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small" ></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Milestones</h2>
                     </header>
                       
                     <div class="slds-modal__content slds-p-around_medium">
                         <template if:true={mipMilestoneRecs}>
                            <lightning-datatable
                                key-field="Id"
                                data-id ="Milestones"
                                data={mipMilestoneRecs}
                                show-row-number-column
                                hide-checkbox-column
                                columns={mipMilestoneColumns}
                                draft-values={saveDraftValues}
                                onsave={handleSaveMilestone}>
                            </lightning-datatable>
                         </template>
                         <template if:true={noMilestones}>
                            <h2 class="slds-text-heading_small slds-hyphenate">No Milestones found</h2>
                         </template>
                         <template if:true={showCreateMilestone}>
                            <lightning-record-form
                                    class="milestone-rec-form"
                                    object-api-name="MIP_Milestone__c"
                                    fields={mipMilestoneFields}
                                    onsubmit={createMilestone}
                                    columns = 2>
                            </lightning-record-form>
                        </template>
                        <div if:true={milestoneLoading} class="slds-spinner_inline spinner-padding">
                            <lightning-spinner variant="brand" 
                                            alternative-text="Loading Milestones"     
                                            size="medium">
                            </lightning-spinner>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Close" title="Close"  onclick={closeModalAction}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
</template>
