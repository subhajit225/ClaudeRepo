<template>
    <lightning-card title="Add Deal Reg">
     <div class="slds-p-horizontal_x-small slds-p-bottom_xx-small">
        <lightning-layout >
            <lightning-layout-item padding="around-small" size="5">
                <lightning-input label="" disabled={disableButtons} type="search" placeholder="Search By First Or Last Name Or Deal Reg No."  onchange={handleKeyChange} variant="label-hidden"></lightning-input>
            </lightning-layout-item>
         <lightning-layout-item padding="around-small" size="4">
            <lightning-button variant="brand" label="Search" disabled={disableButtons} onclick={handleSearch}></lightning-button> 
         </lightning-layout-item>
        </lightning-layout>
    </div> 
    <template if:true={showLoader}>
        <lightning-spinner alternative-text="Loading" size="medium" class="spinnerClass"></lightning-spinner>
    </template>        
	<template if:true={showTable}>
            <c-reusablepaginationlwc records={leads} 
                        total-records={leads.length} 
                        onpaginatorchange={handlePaginatorChange}>
            </c-reusablepaginationlwc>
            <lightning-datatable key-field="Id" 
                                data={recordsToDisplay} 
                                columns={columns}
                                show-checkbox-column
                                max-row-selection = 1
                                onrowselection={handleRowSelection}
                                row-number-offset={rowNumberOffset}>
            </lightning-datatable>
        </template>
       <template if:false={showTable}>
           <div class="slds-align_absolute-center">No search results found</div>
       </template> 
        <div slot="footer">
        <div class="slds-align_absolute-center slds-p-top_medium slds-p-bottom_medium">
            <lightning-button variant="brand" disabled={disableSubmitButton} label="Convert Lead" onclick={handleconvertLead}></lightning-button> 
            <lightning-button variant="neutral" label="Cancel" class="slds-m-left_x-small" onclick={handleCancel}></lightning-button> 
        </div> 
        </div>
    </lightning-card>
</template>
