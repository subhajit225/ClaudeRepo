<template>
    <lightning-layout multiple-rows>
        <lightning-layout-item size="12" small-device-size="12" medium-device-size="12" large-device-size="12"
            class="home-page-cards">
            <div class="slds-card slds-gutter card custom-popup-card slds-m-top_none">
                <div class="slds-p-bottom_x-small">
                    <span class="slds-col cardBodyheading">
                        {title}
                    </span>
                </div>
                <div class="slds-var-m-bottom_large">
                    <span class="slds-col cardBodyDescription">
                        {description}
                    </span>
                </div>
                <template for:each={details} for:item="detail">
                    <div class="slds-p-bottom_small" key={detail.Id} >
                        <span class="cardUrl" >
                            <lightning-formatted-url value={detail.Navigate_Url__c} label={detail.Menu_Label__c} target={detail.target}></lightning-formatted-url><img
                            class="link-arrow-img"
                            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACwAAAAtCAYAAADV2ImkAAAACXBIWXMAABYlAAAWJQFJUiTwAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAD3SURBVHgB7daxDcJADEBR+0BAGZiAESghHRtRAkIiaRAdMzABjEDFGmQClJImOXAqCoKcu+MuEn6tLeUrsqIACCGEEEKIPxZNl+NRvN6CIwq8wMRVtKdg4ibaYzCxj/YcTOyiAwQT8+hAwcQsGjlLw3hzQignYAzH9TOd3K+7FJi6nCWFOtL620NtVG8auNEBT+LdK3q2WnA2WxIMWdnXZ85iG4KzslfM88s+4yyzbhixSEGrIxjQiBFoONSMG8VWLfBj9POjVOf2YdQ4loQ6CaNYEiLYOJb4DraKJT6DrWOJr2AnsYT1WbMyGOQlPJzECiGEEKJ1nnbLYBZlR9+tAAAAAElFTkSuQmCC">
                        </span>
                    </div>
                </template>
                <div>
                    <lightning-button variant="brand" label={buttonLabel} title={buttonLabel} onclick={handleClick}></lightning-button>
                </div>
            </div>
        </lightning-layout-item>
    </lightning-layout>
</template>
