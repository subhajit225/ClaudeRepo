            <div class="slds-p-left_xx-small">

            </div>
        </div>

        <table class="slds-table slds-table_cell-buffer">
            <thead>
                <tr>
                    <th scope="col">
                        <div title="Name" class="slds-p-vertical_x-small">NAME</div>
                    </th>
                    <th scope="col">
                            <div title="Edit" class="slds-p-vertical_x-small"></div>
                        </th>
                        <th scope="col">
                        <div title="Title" class="slds-p-vertical_x-small">TITLE</div>
                    </th>
                    <th scope="col">
                        <div title="Email" class="slds-p-vertical_x-small">EMAIL</div>
                    </th>
                    <th scope="col">
                        <div title="Phone" class="slds-p-vertical_x-small">PHONE</div>
                    </th>
                    <th scope="col">
                        <div title="Status" class="slds-p-vertical_x-small">STATUS</div>
                    </th>
                    <th scope="col">
                        <div title="Activation" class="slds-p-vertical_x-small">ACTIVATION</div>
                    </th>
                </tr>
            </thead>
            <tbody>
                <template if:true={contacts}>
                    <template for:each={contacts} for:item="con" for:index="index">
                        <tr key={con.Id}>
                            <th scope="row" data-label="Name">
                                <div title={con.Name}>{con.Name}</div>
                            </th>
                            <th scope="row" data-label="Edit">
                                <lightning-button-icon class="slds-table-edit-icon"  icon-name="utility:edit" alternative-text="Edit" title="Edit" data-id={con.id} data-index={index} onclick={handleEditUser}></lightning-button-icon>
                            </th>
                            <th scope="row" data-label="Title">
                                <div title={con.Title}>{con.Title}</div>
                            </th>
                            <th scope="row" data-label="Email">
                                <lightning-formatted-email value={con.Email} hide-icon></lightning-formatted-email>
                            </th>
                            <th scope="row" data-label="Phone">
                                <lightning-formatted-phone value={con.Phone}></lightning-formatted-phone>
                            </th>
                            <th scope="row" data-label="Status">
                                <div title={con.Status}>{con.Status}</div>
                                <lightning-badge if:true={con.isNew} label="New"></lightning-badge>
                            </th>
                            <th scope="row" data-label="Activation">
                                <lightning-input type="toggle" label="" name="" checked={con.Toggle} data-id={con.Id} data-email={con.Email} onchange={handleToggle}>
                                </lightning-input>
                            </th>
                        </tr>
                    </template>
                </template>
            </tbody>
        </table>



        <div class="slds-float_right table-nav-arrows slds-m-top_medium">
            <div class="slds-p-right_xx-small">
                <lightning-button label="Prev" disabled={isPrev} onclick={handlePrev} variant="brand" icon-name="utility:back" name="prev" class="slds-p-around_small exploreButton"></lightning-button>
            </div>
            <span class="">Page {pageNumber} of {totalPages}</span>
            <div class="slds-p-left_xx-small">
                <lightning-button label="Next" disabled={isNext} onclick={handleNext} variant="brand" icon-name="utility:forward" icon-position="right" name="next" class="slds-p-around_small exploreButton"></lightning-button>
            </div>
        </div>
    </div>
        <template if:true={isDisplayNoRecords}>
            <div class="slds-align_absolute-center">
                <br/>
                No records found
            </div>
        </template>
        <br/>
    </div>
    <template if:true={showAddUserForm}>
        <c-pc_create-partner-portal-user_lwc onmycustomevent={handleCustomEvent}></c-pc_create-partner-portal-user_lwc>
    </template>
    <template if:true={showEditUserForm}>
        <c-pc_edit-partner-portal-user_lwc contact-record={contactRec} onclose_edit_user_form={handleCloseEditUserEvent}></c-pc_edit-partner-portal-user_lwc>
    </template>
    <template if:true={isShowModalDeactivateUser}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header>
                    <button class="slds-button slds-modal__close slds-float_right slds-align_absolute-center" title="Close" onclick={closeModalDeactivateUser}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="close"
                            variant="inverse"
                            size="small" ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_x-large custom-user-mag-content" id="modal-content-id-2">
                    <template if:true={loader}>
                        <lightning-spinner alternative-text="Loading..." size="small" ></lightning-spinner>
                    </template>
                    <lightning-layout multiple-rows>
                        <lightning-layout-item size="12" small-device-size="12" medium-device-size="12" large-device-size="12">
                            <div class="slds-card no-style-slds-card">
                                <div class="slds-p-top_large slds-p-bottom_medium slds-p-horizontal_small">
                                    <span class="cardBodyHeadline">Please provide a reason for deactivating </span>
                                    <span class="cardBodyHeadline card-body-headline-color">
                                        {userEmail}
                                    </span>
                                </div>
                                <lightning-input type="checkbox" label="Person left the company" onchange={handlePersonLeft}
                                                 name="input2" checked={personLeftTheCompany} class="slds-p-around_small inputClass">
                                </lightning-input>
                                <lightning-input type="checkbox" label="Other" onchange={handleOther}
                                                 name="input3" checked={other} class="slds-p-around_small inputClass">
                                </lightning-input>
                                <hr/>
                                <lightning-button variant="brand" label="Submit" title="Save"
                                                 onclick={handleDeactivateUser} class="slds-p-around_small">
                                </lightning-button>
                                <lightning-button variant="brand" label="Cancel" title="Cancel"
                                                  onclick={closeModalDeactivateUser} class="slds-p-around_small">
                                </lightning-button>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
