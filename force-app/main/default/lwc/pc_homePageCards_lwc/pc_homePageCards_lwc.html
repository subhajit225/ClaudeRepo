        <template for:each={cardList} for:item="card">

                    <div class="slds-p-top_large slds-p-bottom_large">
                        <img class="imgClass" src={card.Image_Url__c}>
                    </div>
                    <div class="slds-p-bottom_x-small">
                        <span class="slds-col cardBodyTag">
                            {card.Tag__c}
                        </span>
                    </div>
                    <div class="slds-p-bottom_x-small">
                        <span class="slds-col cardBodyheading">
                            {card.Headline__c}
                        </span>
                    </div>
                    <div class="slds-p-bottom_x-small">
                        <span class="slds-col cardBodyDescription">
                            {card.Description__c}
                        </span>
                    </div>
                    <div class="slds-p-bottom_x-small">
                        <span class="cardUrl">

    </lightning-layout>
</template>
