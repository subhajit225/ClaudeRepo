<template>
    <template if:true={showSpinner}>
        <lightning-spinner alternative-text="Loading..." size="large"></lightning-spinner>
    </template>
    <div>
        <div class="slds-float_left slds-p-left_x-large slds-p-top_x-large slds-p-bottom_xx-small heading-36">
            Lead Share Dashboard
        </div>
        <div class="slds-float_left slds-p-left_x-large slds-p-right_x-small slds-p-top_x-large slds-p-bottom_small dashboard-action-parent">
            <div class="slds-form-element">
                <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_right">
                    <lightning-icon size="x-small" class="slds-icon slds-input__icon slds-input__icon_right slds-icon-text-default" icon-name="utility:search"></lightning-icon>
                    <input type="text" id="text-input-id-1" placeholder="Search Text" class="slds-input" value={searchText} onkeyup={handleSearchText}/>
                </div>
            </div>
            <lightning-button variant="brand" label="Reset" title="Reset" onclick={handleReset} class="slds-m-left_x-small"></lightning-button>
            <lightning-button variant="brand" label="Export" title="Export" onclick={handleExportClick} class="slds-m-left_x-small" icon-name="utility:download" disabled={disableExport}></lightning-button>
        </div>
    </div>
    <div class="sldx-table-box">
        <table class="slds-table slds-table_cell-buffer lead-dashboard-table">
            <thead>
                <tr>
                    <th scope="col" class="name-col">
                        <div title="Name" class="slds-p-vertical_x-small">
                            <lightning-button variant="base" label="NAME" title="NAME" name="name" onclick={handleSort}
                            icon-name={nameIcon}
                            icon-position="right">
                            </lightning-button>
                        </div>
                    </th>
                    <th scope="col" class="compoany-col">
                        <div title="Company" class="slds-p-vertical_x-small">
                            <lightning-button variant="base" label="COMPANY" title="COMPANY" name="company" onclick={handleSort} 
                            icon-name={companyIcon}
                            icon-position="right"></lightning-button>
                        </div>
                    </th>
                    <th scope="col" class="email-col">
                        <div title="Email" class="slds-p-vertical_x-small">
                            <lightning-button variant="base" label="EMAIL" title="EMAIL" name="email" onclick={handleSort}  
                            icon-name={emailIcon}
                            icon-position="right"></lightning-button>
                        </div>
                    </th>
                    <th scope="col" class="phone-col">
                        <div title="Phone" class="slds-p-vertical_x-small">
                        PHONE
                        </div>
                    </th>
                    <th scope="col" class="job-title-col">
                        <div title="Job Title" class="slds-p-vertical_x-small">
                        JOB TITLE
                        </div>
                    </th>
                    <th scope="col" class="city-col">
                        <div title="City" class="slds-p-vertical_x-small">
                            CITY
                        </div>
                    </th>
                    <th scope="col" class="state-col">
                        <div title="State" class="slds-p-vertical_x-small">
                            STATE
                        </div>
                    </th>
                    <th scope="col" class="country-col">
                        <div title="Country" class="slds-p-vertical_x-small">
                            COUNTRY
                        </div>
                    </th>
                    <th scope="col" class="status-col">
                        <div title="Status" class="slds-p-vertical_x-small">
                            <lightning-button variant="base" label="STATUS" title="STATUS" name="status" onclick={handleSort}  
                            icon-name={statusIcon}
                            icon-position="right"></lightning-button>
                        </div>
                    </th>
                    <th scope="col" class="expires-on-col">
                        <div title="ExpirationDate" class="slds-p-vertical_x-small">
                            EXPIRES ON
                        </div>
                    </th>
                    <th scope="col">
                        <div class="slds-p-vertical_x-small"></div>
                    </th>
                </tr>
            </thead>
            <tbody>
                <template if:true={pageRecords}>
                    <template for:each={pageRecords} for:item="data" for:index="index">
                        <tr key={data.Id} class={data.highlightRow}>
                            <th scope="row" data-label="Name" class="name-col">
                                <div title={data.name}>{data.name}</div>
                            </th>
                            <th scope="row" data-label="Company" class="compoany-col">
                                <div title={data.company}>{data.company}</div>
                            </th>
                            <th scope="row" data-label="Email" class="email-col">
                                <div title={data.email}>{data.email}</div>
                            </th>
                            <th scope="row" data-label="Phone" class="phone-col">
                                <div title={data.phone}>{data.phone}</div>
                            </th>
                            <th scope="row" data-label="Jon Title" class="job-title-col">
                                <div title={data.title}>{data.title}</div>
                            </th>
                            <th scope="row" data-label="City" class="city-col">
                                <div title={data.city}>{data.city}</div>
                            </th>
                            <th scope="row" data-label="State" class="state-col">
                                <div title={data.state}>{data.state}</div>
                            </th>
                            <th scope="row" data-label="Country" class="country-col">
                                <div title={data.country}>{data.country}</div>
                            </th>
                            <th scope="row" data-label="Status" class="status-col">
                                <div title={data.status}>{data.status}</div>
                            </th>
                            <th scope="row" data-label="ExpirationDate" class="expires-on-col">
                                <div title={data.expDate}>{data.expDate}</div>
                            </th>
                            <th scope="row" data-label="Action" class="table-button-col"> 
                                <template if:true={data.showActions}>
                                    <lightning-button-menu alternative-text="Show menu" variant="border-filled" onselect={handleAction} label="Take Action" 
                                    data-id={data.id} data-objname ={data.objName} data-dealregid={data.dealRegId} data-expdate={data.expDate}>
                                        <template for:each={data.actionsList} for:item="action">
                                            <lightning-menu-item value={action.value} label={action.name} key={action.name}></lightning-menu-item>
                                        </template>
                                    </lightning-button-menu>
                                </template>
                            </th>
                        </tr>
                    </template>
                </template>
            </tbody>
        </table>
        <div class="slds-float_right table-nav-arrows slds-m-top_medium">
            <div class="slds-p-right_xx-small">
                <lightning-button label="Prev" disabled={isPrev} onclick={handlePrev} variant="brand" icon-name="utility:back" name="prev" class="slds-p-around_small exploreButton"></lightning-button>
            </div>
            <span class="">Page {pageNumber} of {totalPages}</span>
            <div class="slds-p-left_xx-small">
                <lightning-button label="Next" disabled={isNext} onclick={handleNext} variant="brand" icon-name="utility:forward" icon-position="right" name="next" class="slds-p-around_small exploreButton"></lightning-button>
            </div>
        </div>
    </div>
    <template if:true={showMeetingWidget}>
        <c-pc_meeting-widget_lwc lead-id={leadId} exp-date={expDate} action={meetingAction} onresetmeetingwidget={resetMeetingWidget} onrefresh={refreshData} oncreatedealreg={navigateToDealRegTerms}></c-pc_meeting-widget_lwc>
    </template>
</template>
