<template>
    <div class="slds-card">
        <div>
            <template if:true={showSpinner}>
                <lightning-spinner alternative-text="Loading..." size="medium" variant="brand" class="spinner-background"></lightning-spinner>
            </template>
            <div class="heading-36 slds-m-bottom_medium slds-p-left_small">Performance Dashboard</div>
            <lightning-layout multiple-rows="true" horizontal-align="spread">
                <lightning-layout-item size="12" large-device-size="2" medium-device-size="3" small-device-size="6"  class="slds-p-left_small">
                    <lightning-combobox name="Fiscal Year" label="Fiscal Year" value={fiscalYear} placeholder={currentFiscalYear} options={fiscalYearOptions} onchange={handlefiscalYearChange}></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="12" large-device-size="6" medium-device-size="3" small-device-size="6" class="slds-p-left_xx-small">
                    <c-pc_account-Hierarchy onaccountfilter={handleAccountFilter}></c-pc_account-Hierarchy>
                </lightning-layout-item>
                <lightning-layout-item size="12" large-device-size="3" medium-device-size="3" small-device-size="12" class="slds-p-around_xx-small">
                    <div class="slds-form-element slds-m-top_large slds-float_right" style="display:flex;">
                        <label class="slds-checkbox_toggle slds-grid">
                            <span id="toggleText" class="slds-form-element__label slds-m-bottom_none">TCV</span>
                            <input id="toggleComp" type="checkbox" name="amountToggle" style="margin-top: 1px;" onchange={handleToggleChange} class="toggleClass"/>
                            <span id="toggle" class="slds-checkbox_faux_container" style="margin-top: 4px;">
                            <span class="slds-checkbox_faux toggleClass"></span>
                            <span class="slds-p-top_xx-small slds-m-left_xx-small">Amount</span>
                            </span>
                        </label>
                        <div id="toggleText1" class="slds-form-element__label slds-m-left_x-small">ACV</div>
                    </div>
                </lightning-layout-item>
                <lightning-layout-item size="12" large-device-size="1" medium-device-size="3" small-device-size="6"  padding="around-small"> 
                    <div class="slds-m-top_medium slds-float_right">
                        <lightning-button variant="brand" label="Reset" title="Reset" onclick={handleReset} class="slds-m-left_x-small" disabled={disableReset}></lightning-button>
                    </div>
                </lightning-layout-item>
            </lightning-layout>
        </div>
        <div>
            <lightning-layout multiple-rows>    
                <template for:each={cardList} for:item="card" if:true={displayCardList}>
                    <lightning-layout-item size="12" padding="around-small" small-device-size="3" medium-device-size="6" large-device-size="4" key={card.id}>
                        <div id={card.url} class={card.classStyle} data-id={card.data} onclick={navigatePage} data-navigate={card.navigate}>
                            <div class="pipelineCardNumber">{card.count}</div>
                            <div class="pipelineCardText slds-m-bottom_large slds-m-top_x-small">{card.data}</div>
                            <div class="amountText pipelineCardText">{card.amount}</div>
                        </div>
                    </lightning-layout-item>
                </template>
            </lightning-layout>
        </div>
    </div>
    <c-pc_partner-report_lwc></c-pc_partner-report_lwc>
</template>
