<template>
    <lightning-spinner if:true={loadSpinner} alternative-text="Loading" size="medium" variant="brand" class="spinner-background"></lightning-spinner>
    <lightning-card class="opportunity-card spiff-card">
        <div class="heading-36 slds-var-m-bottom_x-large">SPIFF Claim Report</div>
        <lightning-layout multiple-rows="true" horizontal-align="spread">
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="2" small-device-size="6" class="slds-p-horizontal_small">
                <lightning-input type="text" name="" placeholder="Search Customer Name" label="Customer Name" onchange={handleSearchChange} value={accountSearch}></lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="2" small-device-size="6" class="slds-p-horizontal_small">
                <lightning-combobox name="Fiscal Year" label="Fiscal Year" value={fiscalYear} placeholder={fiscalYear} options={fiscalYearOptions} onchange={handlefiscalYearChange}></lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="2" small-device-size="6" class="slds-p-horizontal_small">
                <lightning-combobox name="Status" label="Status" value={status} placeholder="Select Status" options={statusOptions} onchange={handleStatusOptChange}></lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="2" small-device-size="6" class="slds-p-horizontal_small slds-m-top_medium">
                <lightning-combobox name="Incentive" label="Incentive" value={incentiveType} placeholder="Select Incentive Type" options={incentiveOptions} onchange={handleIncentiveOptChange}></lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="3" small-device-size="6" class="slds-p-horizontal_small slds-m-top_medium">
                <c-pc_account-Hierarchy onaccountfilter={handleAccountFilter}></c-pc_account-Hierarchy>
            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="4" medium-device-size="3" small-device-size="6" class="slds-p-horizontal_small slds-m-top_medium">
                <div class="slds-var-m-top_x-large">
                    <lightning-button variant="brand" label="Reset" title="Reset" onclick={handleResetClick} class="slds-var-m-left_x-small"></lightning-button>
                    <lightning-button variant="brand" label="Export" title="Export" onclick={handleExportClick} class="slds-var-m-left_x-small" icon-name="utility:download" disabled={disableExport}></lightning-button>
                </div>
            </lightning-layout-item>
        </lightning-layout>
        <div class="custom-table-wrapper custom-opportunity-table slds-m-top_x-large">
            <lightning-datatable
                    key-field="id"
                    data={SPIFFList}
                    row-number-offset={rowOffset}
                    show-row-number-column
                    hide-checkbox-column
                    columns={columns}>
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
