<template>

    <lightning-button variant="neutral" label="Choose Playbook Template" title="Choose Playbook Template" onclick={openModal} class="slds-m-left_x-small">
    </lightning-button>
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Choose Playbook Template</h2>
                </header>
                <div class="slds-modal__content slds-p-horizontal_medium slds-p-bottom_medium" id="modal-content-id-1">
                        <template if:true={isTemplateScreen}>
                            <lightning-card>
                                <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                    <lightning-input type="search" label="Search templates" value={searchTerm} data-action='search' onchange={handleAction}></lightning-input>
                                </div>

                                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th class="slds-text-align_center">
                                            </th>
                                            <th>Template Name</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template if:true={isLoading}>
                                            <template for:each={isLoadingArray} for:item="item">
                                                <tr key={item.id}>
                                                    <td>
                                                        <div class="shimmer"></div>
                                                    </td>
                                                    <td>
                                                        <div class="shimmer"></div>
                                                    </td>
                                                </tr>
                                            </template>
                                        </template>
                                        <template if:false={isLoading}>
                                            <template for:each={filteredTemplateOptions} for:item="template">

                                                <tr key={template.Name} class="slds-hint-parent">
                                                    <td class="slds-text-align_center">
                                                        <label class="slds-checkbox">
                                                            <input type="radio" data-id={template.Id} checked={template.isSelected} onchange={handleTemplateChange} />
                                                            <span class="slds-radio_faux"></span>
                                                            <span class="slds-assistive-text">Select item</span>
                                                        </label>
                                                    </td>
                                                    <td>{template.Name}</td>
                                                </tr>
                                            </template>
                                        </template>
                                    </tbody>
                                </table>

                                <template if:false={isLoading}>
                                    <template if:false={templateOptions.length}>
                                        <div class="slds-align_absolute-center" style="height:2rem">No templates found that can be utilized</div>
                                    </template>
                                </template>
                            </lightning-card>
                        </template>
                         <template if:true={isTitleScreen}>
                                <lightning-card title="">
                                    <div class="slds-p-around_medium lgc-bg">
                                        <lightning-spinner if:true={isLoading}></lightning-spinner>
                                        <lightning-input type="text" label="Template" value={selectedTemplateName} variant='label-inline' disabled></lightning-input>
                                        <lightning-record-edit-form object-api-name="Playbook__c" onsuccess={handleSuccess} onload={handleLoad}>
                                            <lightning-messages></lightning-messages>
                                                <lightning-input-field field-name="Name" required variant='label-inline' value={title} data-action="titlechange" onchange={handleAction} ></lightning-input-field>
                                        </lightning-record-edit-form>
                                    </div>
                                </lightning-card>
                         </template>
                </div>

                <footer class="slds-modal__footer">
                    <div class="slds-align_absolute-center">
                        <template if:true={isTemplateScreen}>
                            <button class="slds-button slds-button_neutral" data-action="cancel" onclick={handleAction} title="Cancel">Cancel</button>
                        </template>
                        <template if:true={isTemplateScreen}>
                            <button class="slds-button slds-button_brand" disabled={isNextDisabled} data-action="next" onclick={handleAction} title="Previous">Next</button>
                        </template>
                        <template if:true={isTitleScreen}>
                            <button class="slds-button slds-button_neutral" data-action="previous" onclick={handleAction} disabled={isTemplateScreen}  title="Previous">Previous</button>
                        </template>
                        <template if:true={isTitleScreen}>
                            <button class="slds-button slds-button_brand" data-action="save" onclick={handleAction} title="Save" disabled={isSaveDisabled} >Save</button>
                        </template>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
