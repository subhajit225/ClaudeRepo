<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
    </template>
    <lightning-card title="Rate card for MSP PayGo" icon-name="standard:product">

        <div class="slds-p-around_medium">

            <!-- ACTION BUTTONS -->
            <div class="slds-m-bottom_medium">
                <lightning-button label="Delete Selected" variant="destructive"
                    onclick={deleteSelected} disabled={isDeleteDisabled}>
                </lightning-button>
            </div>

            <!-- SEARCH Functionality -->
            <template if:true={showPicker}>
                <div class="slds-m-bottom_small">
                    <lightning-record-picker label="test" variant="label-hidden" object-api-name="Product2"
                        placeholder="Search a Product" value={selectedProductId} onchange={handleProductSelection}
                        data-id="rateCardProductPicker">
                    </lightning-record-picker>
                </div>
            </template>

            <!-- TABLE -->
            <template if:true={hasData}>
                <div class="datatable-container">
                    <div class="slds-box slds-theme_default slds-p-around_none">
                        <lightning-datatable key-field="Id" data={pagedData} columns={columns}
                            draft-values={draftValues} onsave={handleSave} onsort={handleSort} show-column-borders
                            onrowselection={handleRowSelection} sorted-by={sortedBy} sorted-direction={sortedDirection}>
                        </lightning-datatable>
                    </div>
                </div>
                <!-- PAGINATION -->
                <div class="slds-m-top_small slds-align_absolute-center">
                    <lightning-button label="Previous" onclick={previousPage} disabled={isFirstPage}>
                    </lightning-button>

                    <span class="slds-p-horizontal_small">
                        Page {pageNumber} of {totalPages}
                    </span>

                    <lightning-button label="Next" onclick={nextPage} disabled={isLastPage}>
                    </lightning-button>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
