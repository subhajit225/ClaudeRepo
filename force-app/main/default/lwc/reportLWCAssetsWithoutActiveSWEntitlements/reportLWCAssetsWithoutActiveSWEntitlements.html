<template>
    <div class="report-container">
        <!-- Sticky Header Wrapper -->
        <div class="sticky-header-wrapper">
            <div class="sticky-header slds-card">
                <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-around_medium">
                    <h1 class="slds-text-heading_medium">
                        <lightning-icon icon-name="standard:asset_relationship" size="small" class="slds-m-right_x-small"></lightning-icon>
                        Assets Without Active SW Entitlements
                    </h1>
                    <lightning-badge label={totalRecords}></lightning-badge>
                </div>
                <div class="filter-container slds-card__body slds-p-around_medium">
                    <div class="slds-grid slds-grid_align-center slds-wrap slds-gutters">
                        <!-- Account Name Filter -->
                        <div class="filter-item slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                            <lightning-input
                                type="text"
                                label="Account Name"
                                value={accountNameVar}
                                onchange={handleAccountNameChange}
                                placeholder="Filter account name..."
                                variant="label-inline"
                                class="filter-input">
                            </lightning-input>
                        </div>

                        <!-- Date Filter -->
                        <div class="filter-item slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                            <lightning-input
                                type="date"
                                label="Support Start Date"
                                value={startDateVar}
                                onchange={handleStartDateChange}
                                placeholder="Filter by Start Date..."
                                variant="label-inline"
                                class="filter-input">
                            </lightning-input>
                        </div>

                        <!-- Search Button -->
                        <div class="filter-item slds-col slds-size_1-of-1 slds-medium-size_3-of-12 slds-align_absolute-center">
                            <lightning-button
                                label="Apply Filters"
                                variant="brand"
                                onclick={handleSearch}
                                disabled={disableButton}
                                class="search-button">
                            </lightning-button>
                        </div>
                    </div>
                </div>           
            </div>
        </div>

        <!-- Scrollable Table Container -->
        <div class="table-container slds-card slds-m-top_medium">
            <div class="slds-card__body">
                <template if:true={isLoading}>
                    <div class="slds-align_absolute-center slds-m-around_large">
                        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                    </div>
                </template>
                <template if:false={isLoading}>
                    <template if:true={data.length}>
                        <div class="datatable-wrapper">
                            <lightning-datatable
                                key-field="assetLink"
                                data={data}
                                columns={columns}
                                hide-checkbox-column
                                sorted-by={sortedBy}
                                sorted-direction={sortDirection}
                                onsort={handleSort}
                                default-sort-direction={defaultSortDirection}>
                            </lightning-datatable>
                        </div>
                    </template>

                    <template if:false={data.length}>
                        <div class="slds-align_absolute-center slds-m-around_large">
                            <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                            <span class="slds-m-left_x-small">No matching records found</span>
                        </div>
                    </template>
                </template>
            </div>
        </div>
    </div>
</template>
