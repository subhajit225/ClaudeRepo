<template>
    <div class="slds-m-bottom_x-small">
        <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-m-bottom_x-small">
            <div class="slds-col slds-m-right_xxx-small">
                <label class="fieldname"><b>Disable automated user registration approval</b></label>
            </div>
            <div class="slds-col help">
                <lightning-helptext content="By default, the Rubrik Support Portal automatically approves user registration requests for
                    organizations with an active entitlement, and users are automatically associated to an organization
                    using email domain matching. Organizations can control access to the Rubrik Support Portal and disable
                    the automated user approval by configuring this setting. Once disabled, all users registering for a Rubrik
                    Support Portal login must contact authorized Admin Panel users.">
                </lightning-helptext>
            </div>
            <div class="slds-col">
                <lightning-input type="toggle" checked={enforceAdminPanel} onchange={handleToggleChange}
                    message-toggle-active="ON" message-toggle-inactive="OFF" disabled={disableToggle}>
                </lightning-input>
            </div>
        </div>

        <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-center">
            <div class="slds-col">
                <template if:true={isAuditAvailable}>
                    <div class="slds-m-vertical_xxx-small">
                        <p class="message">Automated user registration approval was {auditValue} by {auditUserName} (<a>{auditUserEmail}</a>) on&nbsp;
                            <lightning-formatted-date-time value={auditDate} year="numeric" month="numeric"
                                day="numeric" hour="2-digit" minute="2-digit" time-zone="UTC" time-zone-name="short"
                                hour12="false">
                            </lightning-formatted-date-time>
                        </p>
                    </div>
                </template>
                <template if:true={showSpinner}>
                    <div class="spin">
                        <svg class="fade-out" role="status" viewBox="-5 -5 100 50">
                            <circle r="10%" cx="15%" cy="50%" color="#000" />
                            <circle r="10%" cx="50%" cy="50%" color="#000" />
                            <circle r="10%" cx="85%" cy="50%" color="#000" />
                        </svg>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
