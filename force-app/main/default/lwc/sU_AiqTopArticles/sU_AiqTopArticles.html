<template>
	<div class="sU-topArticles-mainHodler">

		<template if:true={isDataError}>
			<div class="error-occured" >
				<figure class="unavailable-figure"></figure>
				<p>Oops! Something went wrong!</p>
			</div>
		</template>
		<template if:false={isDataError} >
			<div class="data-actions-bar">
				<!---<template if:false={topArticlesLoader}>
				<div class="citation-feedback" if:false={metaData.isClosed}>
                    <c-s-u_-aiq-feedback feedback-location="top-related-article" case-summary-location={casesummary}
                        key={keys.key3} maincontainerwidth={maincontainerwidth} case-id={caseId} uid={uid} generative-content={top3Cases}
                        end-point={endPoint} token={token} onsentimenttypechange={handleSentimentTypeChange}>
                    </c-s-u_-aiq-feedback>
                </div>
				</template> -->
				<div class="source-filter-holder">
					<button id="filterButton" onclick={filterByButtonHandler}>Select Source
						<svg style="margin-left:5px" xmlns="http://www.w3.org/2000/svg" width="10" height="7" viewBox="0 0 10 7">
							<g id="Group_Filter" transform="translate(14 12) rotate(180)">
								<g transform="translate(14 12) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
									<rect width="10" height="1" rx="0.5" stroke="none"/>
									<rect x="0.5" y="0.5" width="9" fill="none"/>
								</g>
								<g transform="translate(14 9) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
									<rect width="8" height="1" rx="0.5" stroke="none"/>
									<rect x="0.5" y="0.5" width="7" fill="none"/>
								</g>
								<g transform="translate(14 6) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
									<rect width="5" height="1" rx="0.5" stroke="none"/>
									<rect x="0.5" y="0.5" width="4" fill="none"/>
								</g>
							</g>
						</svg>
					</button>
					<div class="filter-menu-holder" id="filter-list-holder">
						<ul class="dropdown-menu-list-holder">
							<li data-filter="all" data-selected="true" onclick={handleFilterSelection}>All</li>
							<li data-filter="how_to__kav" onclick={handleFilterSelection}>Salesforce</li>
							<li data-filter="issue" onclick={handleFilterSelection}>Jira</li>
							<li data-filter="page" onclick={handleFilterSelection}>Confluence</li>
						</ul>
					</div>
				</div>

				<div class="sort-button-holder-articles">
					<button id="sortButton" onclick={sortByButtonHandler}>Sort By
						<svg style="margin-left:5px" xmlns="http://www.w3.org/2000/svg" width="10" height="7" viewBox="0 0 10 7">
							<g id="Group_41902" data-name="Group 41902" transform="translate(14 12) rotate(180)">
								<g id="Rectangle_20117" data-name="Rectangle 20117" transform="translate(14 12) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
								<rect width="10" height="1" rx="0.5" stroke="none"/>
								<rect x="0.5" y="0.5" width="9" fill="none"/>
								</g>
								<g id="Rectangle_20118" data-name="Rectangle 20118" transform="translate(14 9) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
								<rect width="8" height="1" rx="0.5" stroke="none"/>
								<rect x="0.5" y="0.5" width="7" fill="none"/>
								</g>
								<g id="Rectangle_20119" data-name="Rectangle 20119" transform="translate(14 6) rotate(180)" fill="black" stroke="#1d1f20" stroke-width="1">
								<rect width="5" height="1" rx="0.5" stroke="none"/>
								<rect x="0.5" y="0.5" width="4" fill="none"/>
								</g>
							</g>
						</svg>
					</button>
					<div class="sort-menu-holder" id="sort-list-holder">
						<ul class="dropdown-menu-list-holder">
							<li onclick={lastUpdatedSortHandler}>
								Last Updated
							</li>
							<li style="display: none" onclick={mostAttachedSortHandler}>
								Most Attached
							</li>
							<li onclick={topAgentSortHandler}>
								Top Agents
							</li>
						</ul>
					</div>
				</div>
			</div>
			<template if:false={showArticles}>
				<div class="su-noResultsContainer"><c-s-u_-no-results-template></c-s-u_-no-results-template></div>
			</template>

			<template if:true={showArticles}>
				<div class="articles-scroll-holder">
					<template if:true={topArticlesLoader}>
						<div class="data-loader"></div>
					</template>
					<template if:false={topArticlesLoader}>
						<ul class="show-articles-holder">
							<template for:each={processedKnowledgeArticles} for:item="knowledgeArticle" for:index="index">
								<li key={knowledgeArticle.localKey} class="article-holder">
									<div class="article-holder-left">
										<a href={knowledgeArticle.previewUrl} target="_blank" onclick={articlePreview}>
											{knowledgeArticle.Title}
										</a>
										<span>Last Updated at: {knowledgeArticle.lastModifiedDate}</span>
										<span>  |  Source: {knowledgeArticle.sourceLabel}</span>
									</div>
						            <div class="feedback-view-box">
											<!-- <div class="citation-feedback" if:false={metaData.isClosed}> -->
											<c-s-u_-aiq-feedback feedback-location="top-related-articles" case-summary-location={casesummary} key={knowledgeArticle.localKey}
												maincontainerwidth={maincontainerwidth} case-id={caseId} uid={uid} generative-content={knowledgeArticle}
												end-point={endPoint} token={token} onsentimenttypechange={handleSentimentTypeChange}>
											</c-s-u_-aiq-feedback>	
									<!-- </div>										 -->
									<div class="article-holder-right">
										<button style="display: none">
											<svg xmlns="http://www.w3.org/2000/svg" width="5" height="10" viewBox="0 0 5 10">
											<path id="Icon_material-attach-file1" data-name="Icon material-attach-file" d="M14.818,3.773V9a1.818,1.818,0,1,1-3.636,0V3.318a1.136,1.136,0,1,1,2.273,0V8.091a.455.455,0,0,1-.909,0V3.773h-.682V8.091a1.136,1.136,0,0,0,2.273,0V3.318a1.818,1.818,0,0,0-3.636,0V9a2.5,2.5,0,0,0,5,0V3.773Z" transform="translate(-10.5 -1.5)" fill="#0a1a84"/>
											</svg>
											{knowledgeArticle.articleCountInThousands}
										</button>
										<div class="image-name-holder">
											<div class="sample-image-div">
												<img src={knowledgeArticle.Icon} alt="user-image"/>
												<template if:true={knowledgeArticle.isActive}>
													<div class="green-dot"></div>
												</template>
											</div>
											<span>{knowledgeArticle.OwnerName}</span>
											<div class="owner-full-name-holder">
												{knowledgeArticle.OwnerName}
											</div>
										</div>
									</div>
								   </div>

								</li>
							</template>
						</ul>
					
					</template>
				</div>
			</template>
		</template>
	</div>

</template>
