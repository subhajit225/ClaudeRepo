<template>
    <template if:true={customSettingsFilled}>
        <div class="slds-grid slds-wrap">
            <div dir={directionText} data-id="su_BannersearchBox"
                class={searchboxClass}>
                <div class={showViewedResults}>
                    <template if:true={customSettingsFilled}>
                        <div>
                            <div class={innerSearchBoxClass}>
                                <div data-id="form-search" class="outerform">
                                    <div
                                        class="slds-form-element__control slds-input-has-icon_left-right searchIconParent">
                                        <lightning-input class="su__search-bar su__rtlpx-2" maxlength="500"
                                            placeholder="Search Here" value={searchString2} onkeyup={enterKeySearch}
                                            data-id="searchBoxInput" focus={onfocus} type="text" autocomplete="off"
                                            onchange={handleSearchStringChange} onkeydown={handleKeyDown}>
                                        </lightning-input>
                                        <template if:true={searchString2}>
                                            <span class="su__search-bar-close-icon" onclick={deleteSearch}>
                                                <lightning-button-icon icon-name="utility:close" size="large"
                                                    variant="bare"></lightning-button-icon>
                                            </span>
                                        </template>
                                        <span class="su__search-bar-icon" onclick={submitForm}>
                                            <!-- Customization: Removed lightning-button-icon and added 'Search' text -->
                                            Search
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <span data-id="su-suggestions" class="su-autocompleteDiv">
                                <template if:true={getCurrentStringLength}>
                                    <div class="su__autoSuggestions su__width-100" data-id="autosuggestElement"
                                        onmouseleave={mouseleft}>
                                        <template if:true={recommendedSearches}>
                                            <template for:each={recommendedSearches} for:item="recommendedItem">
                                                <div key={recommendedItem.title} tabindex="-1"
                                                    class="su-autoSuggest-element" data-id={recommendedItem.title}>
                                                    <template if:true={recommendedItem.recommendedRecentSearch}>
                                                        <svg class ="su__mr-5px su__ml-7px " xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                                                    </template>
                                                    <template if:true={recommendedItem.recommendedAutoSuggestion}>
                                                        <svg class ="su__mr-5px su__ml-7px " xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M0 0h24v24H0z" fill="none"/></svg>
                                                    </template>
                                                    <span class="su__cursor" data-suggest="true"
                                                        onclick={autoSuggestionClick} onmousedown={autoSuggestionClick} data-id={recommendedItem.title} data-recent="true">
                                                        {recommendedItem.title}
                                                    </span>
                                                </div>
                                            </template>
                                        </template>
                                        <template if:true={autosuggestList.length}>
                                                <template for:each={autosuggestList} for:item="autosuggestItem" for:index="indexVar">
                                                    <div key={autosuggestItem._id} tabindex="-1" class="su-autoSuggest-element"
                                                        data-id={autosuggestItem.autosuggestTitleToDisplay} data-count={autosuggestListLength} data-auto="true"
                                                        data-value={autosuggestItem._id} data-url={autosuggestItem.href}
                                                        data-subject={autosuggestItem.highlight.TitleToDisplayString} data-type={autosuggestItem.objName}
                                                        data-index={autosuggestItem.sourceName} data-rank={indexVar} data-track={autosuggestItem.trackAnalytics}>
                                            
                                                        <span class="su_autosuggest_icon">
                                                            <template if:true={autosuggestItem.iconPresent}>
                                                                <div class="su__w-h-20px su__mr-5px">
                                                                    <img src={autosuggestItem.icon} alt={autosuggestItem.icon} />
                                                                </div>
                                                            </template>
                                                            <a class="su-autosuggest-title" href={autosuggestItem.href}>
                                                                <span class="su__cursor" onclick={autoSuggestionClick} onmousedown={autoSuggestionClick}
                                                                    data-count={autosuggestListLength} data-id={autosuggestItem.highlight.TitleToDisplayString}
                                                                    data-auto="true" data-value={autosuggestItem._id} data-url={autosuggestItem.href}
                                                                    data-subject={autosuggestItem.highlight.TitleToDisplayString}
                                                                    data-type={autosuggestItem.objName} data-index={autosuggestItem.sourceName} data-rank={indexVar}
                                                                    data-track={autosuggestItem.trackAnalytics}>
                                                                    <lightning-formatted-rich-text value={autosuggestItem.autosuggestTitleToDisplay}>
                                                                    </lightning-formatted-rich-text>
                                                                </span>
                                                                <template if:true={autosuggestItem.pfamily}>
                                                                    <span class="meta-source-name">
                                            
                                                                        <lightning-formatted-rich-text value={autosuggestItem.pfamily}>
                                                                        </lightning-formatted-rich-text>
                                                                    </span>
                                                                </template>
                                                            </a>
                                                        </span>
                                                        <template if:true={autosuggestItem.autosuggestData}>
                                                            <div
                                                                class="slds-large-size--1-of-1 slds-small-size--1-of-1 slds-medium-size--1-of-1 su-autosuggest-content">
                                                                <div style="line-height:18px">
                                                                    <template for:each={autosuggestItem.autosuggestData} for:item="metadata">
                                                                        <template if:true={metadata.metaValue}>
                                                                            <template if:true={metadata.value}>
                                                                                <span class="su-metadata" style="display:inline-block" key={metadata}>
                                                                                    <span style="margin-right:12px">
                                                                                        <template if:true={metadata.metaKeyValBoolean}>
                                                                                            <b class="su-metadataTitle">
                                                                                                {metadata.metaKeyVal}
                                                                                            </b>&lrm;:
                                                                                        <template for:each={metadata.value}
                                                                                            for:item="metadataVal">
                                                                                            <lightning-formatted-date-time
                                                                                                key={metadataVal}
                                                                                                year="numeric"
                                                                                                month="numeric"
                                                                                                day="numeric" hour="2-digit"
                                                                                                minute="2-digit"
                                                                                                time-zone-name="short"
                                                                                                hour12="true"
                                                                                                style="margin-left: 4px;"
                                                                                                    value={metadataVal}>
                                                                                                </lightning-formatted-date-time>
                                                                                            </template>
                                                                                        </template>
                                                                                    <template
                                                                                        if:false={metadata.metaKeyValBoolean}>
                                                                                        <template
                                                                                            if:true={metadata.metaKeyVal}>
                                                                                                <b class="su-metadataTitle">
                                                                                                    {metadata.metaKeyVal}&lrm;:
                                                                                                </b>
                                                                                            </template>
                                                                                        <template for:each={metadata.value}
                                                                                            for:item="metadataVal"
                                                                                                for:index="singleVal">
                                                                                            <span class="su-metadataVal"
                                                                                                style="margin-left: 4px;"
                                                                                                    key={metadataVal}>
                                                                                                    {metadataVal}
                                                                                                </span>
                                            
                                                                                            </template>
                                                                                        </template>
                                            
                                                                                    </span>
                                                                                </span>
                                                                            </template>
                                                                        </template>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                        </template>
                                        <template if:true={isSmartAggregationsNotEmpty}>
                                            <div class="auto-main" id="autosuggestAutoElement"
                                                style="position: static; width: 100%; bottom: 0; box-shadow: 0 2px 5px rgb(0 0 0 / 25%)">
                                                <template for:each={smartAgg} for:item="item" for:index="index">
                                                    
                                                    <div key={item.key}>
                                                        <template if:true={item.values.length}>
                                                            <div class="su__product-suggestion">
                                                                
                                                                <div
                                                                    class="su__product-sugg-iner su__flex-vcenter su__flex-wrap">
                                                                    <div
                                                                        class="su__product-sugg-title su__mb-3 su__f-bold su__font-13">
                                                                        {item.label}
                                                                    </div>
                                                                </div>
                                                                <div class="su__d-flex">
                                                                    <div>
                                                                        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 19 19">
                                                                            <defs>
                                                                                <clipPath id="clip-Icon">
                                                                                    <rect width="19" height="19" />
                                                                                </clipPath>
                                                                            </defs>
                                                                            <g id="Icon" clip-path="url(#clip-Icon)">
                                                                                <g id="Group_12384" data-name="Group 12384" transform="translate(2 2)">
                                                                                    <rect id="Rectangle_2114" data-name="Rectangle 2114" width="15.007" height="1.549" rx="0.774"
                                                                                        transform="translate(0 6.81)" fill="#919bb0" />
                                                                                    <rect id="Rectangle_2115" data-name="Rectangle 2115" width="15.007" height="1.549" rx="0.774"
                                                                                        transform="translate(0 1.377)" fill="#919bb0" />
                                                                                    <rect id="Rectangle_2116" data-name="Rectangle 2116" width="15.007" height="1.549" rx="0.774"
                                                                                        transform="translate(0 11.904)" fill="#919bb0" />
                                                                                    <circle id="Ellipse_89" data-name="Ellipse 89" cx="2.237" cy="2.237" r="2.237"
                                                                                        transform="translate(8.813 5.429)" fill="#919bb0" />
                                                                                    <circle id="Ellipse_90" data-name="Ellipse 90" cx="2.237" cy="2.237" r="2.237"
                                                                                        transform="translate(5.096)" fill="#919bb0" />
                                                                                    <circle id="Ellipse_91" data-name="Ellipse 91" cx="2.237" cy="2.237" r="2.237"
                                                                                        transform="translate(1.893 10.527)" fill="#919bb0" />
                                                                                </g>
                                                                            </g>
                                                                        </svg>
                                                                
                                                                    </div>
                                                                    <div class="customProductSpacing su__flex-vcenter su__flex-wrap su__ml-3">
                                                                        <template for:each={item.values} for:item="product" for:index="_index">
                                                                            <template if:true={product.selected}>
                                                                                <div key={product.key}
                                                                                    class={product.selectedClass}
                                                                                    onclick={smartAutocompleteSelection}
                                                                                    data-smart={index}
                                                                                    data-filter={_index}
                                                                                    data-id={productContentnameWithSmartFacet}>
                                                                                    {product.Contentname}
                                                                                </div>
                                                                            </template>
                                                                            <template if:false={product.selected}>
                                                                                <div key={product.key}
                                                                                    class={product.selectedClass}
                                                                                    onclick={smartAutocompleteSelection}
                                                                                    data-smart={index}
                                                                                    data-filter={_index}
                                                                                    data-id={productContentnameWithSmartFacet}>
                                                                                    {product.Contentname}
                                                                                </div>
                                                                            </template>
                                                                        </template>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </span>
                            </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
    <template if:false={customSettingsFilled}>
        <span class="customSettingErrMsg">{customSettingErrorMessage}</span>
    </template>
</template>
