<template>
	<div style={positionCitationModal} class={invisibleBorder}  onmouseover={showCitation} onmouseleave ={closeCitationModal}   >
		<div  data-id="citations" class={handleGptPreview}>
			<div class={citaionContainer}>
				<template if:true={isDeviceMobile}>
					<div class="su__heading_container_citation">
						<span class="su__heading_citation">CITATION</span>
						<figure class="su__cross_svg su__cursor_pointer" onclick={closeCitationModal}>
							<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">
								<path id="Path_18325" data-name="Path 18325"
									d="M10.214,10.2a.71.71,0,0,1,1.006,0L15,13.975,18.78,10.2A.712.712,0,1,1,19.786,11.2L16.01,14.986l3.776,3.783a.712.712,0,0,1-1.006,1.007L15,16l-3.78,3.779a.712.712,0,0,1-1.006-1.007l3.776-3.783L10.214,11.2A.712.712,0,0,1,10.214,10.2Z"
									transform="translate(-10.005 -9.977)" fill="#666" />
							</svg>
						</figure>
					</div>
				</template>
				<div class={articleTitle}>
					<a class={titleDimension} target='_blank' href={citationHref} aria-label={citationTitle}
						onclick={runScriptMethod}>
						<lightning-formatted-rich-text value={citationTitle} class="su__line_clamp_2">
						</lightning-formatted-rich-text>
					</a>
					<template if:false={isDeviceMobile}>
						<a class='su__open_article_icon' href={citationHref} target='_blank' onclick={runScriptMethod}>
							<figure class="su__open_href_svg">
								<svg id="Group_19941" data-name="Group 19941" xmlns="http://www.w3.org/2000/svg"
									width="11.5" height="11.5" viewBox="0 0 11.5 11.5" class='su__cursor_pointer'>
									<path id="Path_18321" data-name="Path 18321"
										d="M12.471,19H5.029A2.032,2.032,0,0,1,3,16.971V9.529A2.032,2.032,0,0,1,5.029,7.5H7.284a.676.676,0,0,1,0,1.353H5.029a.677.677,0,0,0-.676.676v7.441a.677.677,0,0,0,.676.676h7.441a.677.677,0,0,0,.676-.676V14.716a.676.676,0,1,1,1.353,0v2.255A2.032,2.032,0,0,1,12.471,19Z"
										transform="translate(-3 -7.5)" fill="#535355" />
									<path id="Path_18322" data-name="Path 18322"
										d="M25.735,8.412a.676.676,0,0,1-.676-.676V4.353H21.676a.676.676,0,0,1,0-1.353h4.059a.676.676,0,0,1,.676.676V7.735A.676.676,0,0,1,25.735,8.412Z"
										transform="translate(-14.912 -3)" fill="#535355" />
									<path id="Path_18323" data-name="Path 18323"
										d="M14.176,11.794a.676.676,0,0,1-.478-1.155L21.139,3.2a.676.676,0,1,1,.957.957L14.655,11.6A.674.674,0,0,1,14.176,11.794Z"
										transform="translate(-10.794 -3)" fill="#535355" />
								</svg>
							</figure>
						</a>
					</template>

				</div>
				<div class={articleDescContainer}>
					<span class="su__citation_desc su__line_clamp_2" data-id="citationDesc">
                  </span>
				</div>
				<div class={diamondClass}>
				</div>
			</div>
		</div>
	</div>
	<template if:true={isDeviceMobile}>
		<div class="su-bg-overlay su-citation-bg" onclick={closeCitationModal} role="button" tabindex="0"></div>
	</template>
</template>
