                                            <span> Activity Type </span>

                                                        onclick={checkUncheck} />{filter.filterName}
                                                </label>
                                            </template>

                                        </div>
                                    </template>

                                <th class="suanalyticsdata">Activity Details</th>
                                <th class="suanalyticsdata">Interface</th>

                                    <td data-id="suAnalyticsTypeId" class="suanalyticstype ">{item.ActivityType}</td>
                                    <template if:true={item.showAnchorTag}>
                                        <td class="suanalyticsdata">

                                        </td>
                                    </template>
                                    <template if:false={item.showAnchorTag}>
                                        <td class="suanalyticsdata">
                                            {item.ActivityValue}
                                        </td>
                                    </template>
                                    <td class="suanalyticsdata ">{item.Interface}</td>
