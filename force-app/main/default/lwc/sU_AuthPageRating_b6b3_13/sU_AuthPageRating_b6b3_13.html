<template>
	<template if:true={customSettingsFilled}>
			<!-- Code for Page Rating Widget (Yes/no,thumbs up/down, stars, Emoticons)  -->
	<template if:true={showPageRatingWidget}>
		<div id="su-rating-cmp" class="su_page_rating_box">
			<div class="su_page_box">
				<div class="su_feedback_form">
					<div class="su_feedback_inner">
						<label class="feedtxt">{pageRatingCustomization.selectedHeader}</label>
						<template if:true={yesNoTemplate}>
							<span class="su__feedback-active su_helpful" data-value="true" data-feedback="1"
								onclick={SubmitFeedback}>Yes</span>
							<span class="su__feedback-active su_unhelpful" data-value="true" data-feedback="0"
								onclick={SubmitFeedback}>No</span>
						</template>
						<template if:true={thumbsUpDownTemplate}>
							<span data-value="true" data-feedback="1" onclick={SubmitFeedback}>
								<svg height="24px" viewBox="0 0 24 24" width="24px"
									class=" su__cursor su__fillhover-blue su__thumbs_up">
									<path d="M0 0h24v24H0V0z" fill="none" />
									<path
										d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" />
								</svg>
							</span>
							<span data-value="true" data-feedback="0" onclick={SubmitFeedback}>
								<svg height="24px" viewBox="0 0 24 24" width="24px"
									class=" su__cursor su__fillhover-blue su__thumbs_down">
									<path d="M0 0h24v24H0z" fill="none" />
									<path
										d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z" />
								</svg>
							</span>
						</template>
						<template if:true={starsTemplate}>
							<div class="su__star-rating su__flex-vcenter su__mb-2">

								<template for:each={dynamicStarsClass} for:item="item" for:index="index">
									<div key={item} onclick={SubmitFeedback} onmouseover={hoverButton}
										onmouseleave={removeHoverButton} class={item.class} data-index={item.id}
										data-value="true"></div>
								</template>
							</div>
						</template>
						<template if:true={emoticonsTemplate}>
							<div id="newId"
								class="su__flex-vcenter su__font-10 su__mb-2 su__emoji-icon">
								<template for:each={dynamicEmoticonClass} for:item="item" for:index="index">
									<div key={item} onclick={SubmitFeedback} onmouseover={hoverButton}
										onmouseleave={removeHoverButton} class={item.class} data-index={item.id}
										data-value="true"></div>
								</template>
							</div>
						</template>
					</div>
				</div>
			</div>
		</div>
	</template>
	<!-- Code for Page Rating widget ends here  -->

	<!-- Code Starts  Here we are sending props to child component that is search feedback which contains the code for pop up that appears after clicking
	page rating widget -->
	<template if:true={openTextSearchFeedbackModal}>
		<c-s-u_-auth-feedback-modal_b6b3_13  reset-selected={resetSelected} dynamic-emoticon-class={dynamicEmoticonClass}
			uid={uid} end-point={endPoint} search-string={searchString} search-feedback-enabled={searchFeedbackEnabled}
			current-user-email={currentUserEmail} show-feedback-modal={openTextSearchFeedbackModal}
			page-rating-object={pageRatingObject} handle-search-feedback={handleSearchFeedback}
			search-page-regex={searchPageRegex} display-text-modal={displayTextModal}
			page-rating-customization={pageRatingCustomization} is-input-disabled={isInputDisabled}
			update-local-storage={updateLocalStorage} rating={rating} set-star-emoticons-rating={setStarEmoticonsRating}
			show-page-rating-widget={showPageRatingWidget} search-feedback-response-data={searchExperienceResponseData}
			display-cross-icon={displayCrossIcon} open-text-search-feedback-modal={openTextSearchFeedbackModal}
			feedback-position={feedbackPosition} user-type-check={userTypeCheck} is-submit-button-active={isSubmitButtonActive} display-thanks-modal={displayThanksModal} is-modal-content={isModalContent}>
		</c-s-u_-auth-feedback-modal_b6b3_13 >
	</template>
	</template>
	<template if:false={customSettingsFilled}>
		<span class="customSettingErrMsg">{customSettingErrorMessage}</span>
	</template>
</template>
