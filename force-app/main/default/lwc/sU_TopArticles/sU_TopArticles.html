<template>
  <div class="ag-filter-section su__justify-content-between su__text-right topButtons su__ag-filter-div filter-fixed-height">
    <div class="date-labels">
      <template if:true={createdChecked}>
        <label>Created Date: {createdStartDate} - {createdEndDate}</label>
      </template>
      <template if:true={updatedChecked}>
        <label>Updated Date: {updatedStartDate} - {updatedEndDate}</label>
      </template>
    </div>
  
  <!-- Slider Button that opens up the date modal-->
    <lightning-button-icon title="Filters" class="expert-filters" icon-name="utility:slider" onclick={openDateModal}></lightning-button-icon>
    <template if:true={DateModalFlag}>
      <div class="su__ag-filter-dropdown su__ag-filter-position">
        <div class="su_listing-style">
          <ul>
            <li>
              <lightning-input type="checkbox" checked={createdChecked} onchange={handleChangeCreatedDate} label="Created Date"></lightning-input>
              <template if:true={createdChecked}>
                <div class="dateModalContent ">
                  <div class="calendars">Start Date:<input type="date" data-id="createdStartDate" max={todaysDate} value={createdStartDate} onchange={handleCreatedDateChange}></input></div>
                  <div class="calendars">End Date:<input type="date" data-id="createdEndDate" min={createdStartDate} max={todaysDate} value={createdEndDate} onchange={handleCreatedDateChange}></input></div>
                </div>
              </template>
              <template if:false={createdChecked}>
                <div class="dateModalContent disableDateDiv">
                  <div class="calendars">Start Date:<input type="date" value={createdStartDate} disabled></input></div>
                  <div class="calendars">End Date:<input type="date" value={createdEndDate} disabled></input> </div>
                </div>
              </template>
            </li>
            <li>
              <lightning-input type="checkbox" checked={updatedChecked} onchange={handleChangeUpdatedDate} label="Updated Date"></lightning-input>
              <template if:true={updatedChecked}>
                <div class="dateModalContent">
                  <div class="calendars">Start Date:<input type="date" data-id="updatedStartDate" max={todaysDate}  value={updatedStartDate} onchange={handleUpdatedDateChange}></input></div>
                  <div class="calendars">End Date:<input type="date" data-id="updatedEndDate" min={updatedStartDate} max={todaysDate} value={updatedEndDate} onchange={handleUpdatedDateChange}></input></div>
                </div>
              </template>
              <template if:false={updatedChecked}>
                <div class="dateModalContent disableDateDiv">
                  <div class="calendars">Start Date:<input type="date" value={updatedStartDate} disabled></input></div>
                  <div class="calendars">End Date:<input type="date" value={updatedEndDate} disabled></input> </div>
                </div>
              </template>
            </li>
            </ul>
        </div>
      </div>
      <div class="slds-backdrop slds-backdrop_open su__ag-backdrop" onclick={openDateModal} data-id="backdrop">
      </div>
    </template>  
  </div>
  
  <!-- Date modal popup Code start-->
  <div class="parent" onscroll={handleScroll}>
   

  <!-- Date modal popup Code end-->
