<template>
    <template lwc:if={isLoading}>
        <div class="slds-spinner_container spinner-container">
            <lightning-spinner alternative-text="Loading quote details" size="medium"></lightning-spinner>
        </div>
    </template>

    <template lwc:elseif={hasError}>
        <div class="slds-p-around_medium">
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2>{errorMessage}</h2>
            </div>
            <div class="slds-m-top_medium slds-text-align_center">
                <lightning-button
                    label="Close"
                    variant="neutral"
                    onclick={handleCancel}
                ></lightning-button>
            </div>
        </div>
    </template>

    <template lwc:else>
        <div class="slds-p-around_medium">
            <!-- Header -->
            <div class="header-bar slds-p-around_medium slds-m-bottom_medium">
                <h2 class="slds-text-heading_medium header-title">Send Order Verification Form</h2>
            </div>

            <!-- Confirmation message -->
            <div class="slds-m-bottom_medium">
                <p class="slds-text-body_regular confirmation-text">
                    You are about to send an OVF email to:
                </p>
            </div>

            <!-- Contact & Quote details -->
            <div class="detail-card slds-p-around_medium slds-m-bottom_medium">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <span class="detail-label">Contact Name</span>
                        <span class="detail-value">{contactName}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <span class="detail-label">Email Address</span>
                        <span class="detail-value">{contactEmail}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-1">
                        <span class="detail-label">Quote Number</span>
                        <span class="detail-value quote-number">{quoteNumber}</span>
                    </div>
                </div>
            </div>

            <!-- Additional Recipients -->
            <div class="additional-emails-section slds-m-bottom_medium">
                <label class="detail-label" for="additional-emails">
                    Additional Recipients <span class="optional-label">(optional)</span>
                </label>
                <lightning-input
                    type="text"
                    value={additionalEmails}
                    placeholder="e.g. manager@company.com, team@company.com"
                    onchange={handleAdditionalEmailsChange}
                    disabled={isSending}
                    class="slds-m-top_xx-small"
                    data-id="additional-emails"
                ></lightning-input>
                <p class="field-helper-text slds-m-top_xx-small">Separate multiple addresses with a comma</p>
                <template lwc:if={additionalEmailsError}>
                    <p class="field-error-text slds-m-top_xx-small">{additionalEmailsError}</p>
                </template>
            </div>

            <!-- Line Items Table -->
            <template lwc:if={hasLineItems}>
                <div class="slds-m-bottom_medium">
                    <p class="slds-text-body_regular slds-m-bottom_x-small">
                        <strong>Quote Line Items ({lineItemCount})</strong>
                    </p>
                    <div class="table-container">
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer line-items-table">
                            <thead>
                                <tr>
                                    <th scope="col" class="table-header">Product</th>
                                    <th scope="col" class="table-header text-center">Qty</th>
                                    <th scope="col" class="table-header text-right">List Price</th>
                                    <th scope="col" class="table-header text-right">Net Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={lineItems} for:item="item">
                                    <tr key={item.id}>
                                        <td>{item.productName}</td>
                                        <td class="text-center">{item.quantity}</td>
                                        <td class="text-right">{item.formattedListPrice}</td>
                                        <td class="text-right">{item.formattedNetTotal}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <!-- Sending spinner overlay -->
            <template lwc:if={isSending}>
                <div class="slds-spinner_container sending-overlay">
                    <lightning-spinner alternative-text="Sending email" size="medium"></lightning-spinner>
                    <p class="sending-text">Sending OVF email...</p>
                </div>
            </template>

            <!-- Action Buttons -->
            <div class="slds-text-align_right slds-m-top_medium button-group">
                <lightning-button
                    label="Cancel"
                    variant="neutral"
                    onclick={handleCancel}
                    disabled={isSending}
                    class="slds-m-right_x-small"
                ></lightning-button>
                <lightning-button
                    label="Send Email"
                    variant="brand"
                    onclick={handleSend}
                    disabled={isSending}
                    icon-name="utility:email"
                ></lightning-button>
            </div>
        </div>
    </template>
</template>
