<template>
	<div class="slds-grid slds-wrap slds-size_12-of-12">
		<div class="slds-size_12-of-12 slds-medium-size_12-of-12 slds-large-size_12-of-12">
			<lightning-card>
				<div class="CSNS_highlightFields slds-size_12-of-12 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-horizontal_x-small"
					style="font-size: 1rem;">
					<lightning-icon icon-name={iconName} onclick={toggleSectionHeader}
						class="slds-icon_container slds-p-left_xx-small slds-float_left" size="xx-small"
						style="padding:3px 3px 0 0;"></lightning-icon>
					<span class="slds-truncate" style="font-weight:bold;font-size:1rem;">{visualforcePageTitle}</span>
				</div>
				<div class="outputFieldSection" style="padding-left:10px;padding-right:10px;">
					<template if:false={isCollapsed}>
						<br/>
						<template lwc:if={visualforceUrl}>
							<iframe src={visualforceUrl} width="100%" height={visualforcePageHeight}></iframe>
						</template>
						<template lwc:else>
							<div class="slds-m-around_medium">
								No Visualforce page found.
							</div>
						</template>
					</template>
				</div>
			</lightning-card>
		</div>
	</div>
</template>
